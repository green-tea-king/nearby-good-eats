name: Update external social signals

on:
  workflow_dispatch:
    inputs:
      max_restaurants:
        description: "Restaurants to query this run"
        required: false
        default: "10"
      offset:
        description: "Optional candidate offset"
        required: false
        default: ""
  schedule:
    - cron: "17 20 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update external signal data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SOCIAL_SIGNAL_MAX_RESTAURANTS: ${{ github.event.inputs.max_restaurants || '10' }}
          SOCIAL_SIGNAL_OFFSET: ${{ github.event.inputs.offset }}
        run: node scripts/update-external-signals.js
      - name: Commit updated signal data
        run: |
          if git diff --quiet -- assets/external-signals.json; then
            echo "No external signal changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/external-signals.json
          git commit -m "Update external social signals"
          git push
