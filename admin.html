<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>在地美食榜後台</title>
<meta name="theme-color" content="#0E0C0D" />
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0E0C0D;--surface:#161213;--surface-2:#1F1819;--line:#2B2225;--text:#F2ECE6;--text-dim:#A89D98;--text-faint:#776B67;--accent:#C8102E;--accent-bright:#EC5A6A;--on-accent:#FFF6F3;--green:#5FB98A;--radius:12px;--sans:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;--mono:"Segoe UI Mono","Noto Sans TC",monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;justify-content:center;}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer;}
.wrap{width:100%;max-width:760px;padding:22px 16px 42px;}
.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;}
h1{font-size:22px;font-weight:650;letter-spacing:.02em;}
.sub{font-size:12px;color:var(--text-dim);margin-top:4px;}
.btn{padding:9px 14px;border-radius:9px;background:var(--surface);border:1px solid var(--line);font-size:13px;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent);}
.status{padding:13px 14px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);color:var(--text-dim);font-size:13px;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;}
.metric b{display:block;font-family:var(--mono);font-size:24px;line-height:1.1;}
.metric span{font-size:12px;color:var(--text-dim);}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-top:12px;}
.panel h2{font-size:14px;padding:12px 14px;border-bottom:1px solid var(--line);color:var(--accent-bright);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
th{color:var(--text-faint);font-weight:500;}
td{color:var(--text-dim);}
tr:last-child td{border-bottom:none;}
.pill{display:inline-flex;padding:2px 7px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--text);font-size:11px;}
.hidden{display:none!important;}
@media(max-width:560px){.grid{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}.head .actions{width:100%;display:flex;gap:8px}.head .actions .btn{flex:1}}
</style>
</head>
<body>
<main class="wrap">
  <header class="head">
    <div>
      <h1>在地美食榜後台</h1>
      <p class="sub">Google 登入使用紀錄與 API 使用概況</p>
    </div>
    <div class="actions">
      <button class="btn primary" id="loginBtn">Google 登入</button>
      <button class="btn hidden" id="logoutBtn">登出</button>
    </div>
  </header>
  <div class="status" id="status">讀取中...</div>
  <section class="grid hidden" id="metrics">
    <div class="metric"><b id="mEvents">0</b><span>今日事件數</span></div>
    <div class="metric"><b id="mUsers">0</b><span>今日使用者</span></div>
    <div class="metric"><b id="mSearch">0</b><span>排行榜 / 搜尋</span></div>
    <div class="metric"><b id="mShare">0</b><span>分享連結</span></div>
  </section>
  <section class="panel hidden" id="eventPanel">
    <h2>最新使用紀錄</h2>
    <table>
      <thead><tr><th>時間</th><th>使用者</th><th>事件</th><th>內容</th></tr></thead>
      <tbody id="eventRows"></tbody>
    </table>
  </section>
</main>
<script>
const cfg = window.APP_FIREBASE_CONFIG || {};
const firebaseCfg = cfg.firebase || {};
const adminEmails = new Set((cfg.adminEmails || []).map(x => String(x).toLowerCase()));
let auth = null;
let db = null;

function configured(){
  return !!(firebaseCfg.apiKey && firebaseCfg.authDomain && firebaseCfg.projectId && firebaseCfg.appId);
}
function $(id){ return document.getElementById(id); }
function setStatus(text){ $("status").textContent = text; }
function fmtTime(ts){
  const d = ts?.toDate ? ts.toDate() : new Date(ts || Date.now());
  return d.toLocaleString("zh-TW", { hour12:false });
}
function payloadText(data){
  const p = data.payload || {};
  return Object.entries(p).slice(0,4).map(([k,v]) => `${k}: ${typeof v === "object" ? JSON.stringify(v) : v}`).join(" / ");
}
function isAdminUser(user){
  return !!user?.email && adminEmails.has(user.email.toLowerCase());
}
async function loadAdminStats(user){
  if (!isAdminUser(user)){
    setStatus(`目前登入：${user.email}。此帳號不是後台管理員。`);
    return;
  }
  setStatus(`目前登入：${user.email}`);
  const today = new Date(); today.setHours(0,0,0,0);
  const snap = await db.collection("usageEvents")
    .where("createdAt", ">=", firebase.firestore.Timestamp.fromDate(today))
    .orderBy("createdAt", "desc")
    .limit(200)
    .get();
  const events = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  const users = new Set(events.map(e => e.email).filter(Boolean));
  $("mEvents").textContent = events.length;
  $("mUsers").textContent = users.size;
  $("mSearch").textContent = events.filter(e => ["leaderboard_open","filter_change","locate_origin","refresh"].includes(e.type)).length;
  $("mShare").textContent = events.filter(e => e.type === "share_copy").length;
  $("metrics").classList.remove("hidden");
  $("eventPanel").classList.remove("hidden");
  $("eventRows").innerHTML = events.slice(0,50).map(e => `
    <tr>
      <td>${fmtTime(e.createdAt)}</td>
      <td>${escapeHtml(e.email || "")}</td>
      <td><span class="pill">${escapeHtml(e.type || "")}</span></td>
      <td>${escapeHtml(payloadText(e))}</td>
    </tr>`).join("") || `<tr><td colspan="4">今天還沒有紀錄</td></tr>`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c]));
}
async function init(){
  if (!configured()){
    setStatus("尚未設定 Firebase。請填寫 firebase-config.js 後再使用後台。");
    $("loginBtn").disabled = true;
    return;
  }
  firebase.initializeApp(firebaseCfg);
  auth = firebase.auth();
  db = firebase.firestore();
  $("loginBtn").addEventListener("click", () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()));
  $("logoutBtn").addEventListener("click", () => auth.signOut());
  auth.onAuthStateChanged(user => {
    $("loginBtn").classList.toggle("hidden", !!user);
    $("logoutBtn").classList.toggle("hidden", !user);
    $("metrics").classList.add("hidden");
    $("eventPanel").classList.add("hidden");
    if (!user) { setStatus("請使用 Google 帳戶登入。"); return; }
    loadAdminStats(user).catch(e => setStatus(`後台讀取失敗：${e.message}`));
  });
}
init();
</script>
</body>
</html>
