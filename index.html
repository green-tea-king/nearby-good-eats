<style>
/* ============================================================
   設計 tokens（暗色，集中於 CSS variables；將來加淺色模式只需多定義一組）
   ============================================================ */
:root{
  --bg:#0E0C0D;            /* 深暖黑 */
  --bg-2:#15100F;          /* 開場漸層 */
  --surface:#161213;       /* 卡片 */
  --surface-2:#1F1819;     /* 展開／次層 */
  --line:#2B2225;          /* 細線 */
  --line-soft:#221B1D;     /* 更淡的線 */
  --text:#F2ECE6;          /* 暖白 */
  --text-dim:#A89D98;      /* 次要 */
  --text-faint:#776B67;    /* 更弱（標籤） */
  --accent:#C8102E;        /* 米其林紅 */
  --accent-bright:#EC5A6A; /* 紅字（暗底上對比夠） */
  --accent-weak:rgba(200,16,46,.13);
  --on-accent:#FFF6F3;     /* 紅底上的文字 */
  --gold:#C8A24C;          /* 星金 */
  --gold-weak:rgba(200,162,76,.15);
  --green:#5FB98A;         /* 營業中 */
  --scroll-track:#0E0C0D;
  --scroll-thumb:rgba(168,157,152,.24);
  --scroll-thumb-hover:rgba(168,157,152,.36);
  /* 評鑑徽章 */
  --michelin:#D8B25E;      /* 米其林＝金 */
  --bib:#EC5A6A;           /* 必比登＝紅 */
  --plate:#8FB3C4;         /* 500盤＝霧藍 */
  --radius:15px;
  --radius-sm:9px;
  --t:220ms;
  --serif:"Cormorant Garamond","Noto Serif TC",Georgia,"Times New Roman",serif;
  --sans:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"Space Grotesk","Noto Sans TC",sans-serif;
}
/* 淺色模式：米其林官網式編輯白（tokens 集中，切換即生效） */
:root[data-theme="light"]{
  --bg:#F7F3EE;
  --bg-2:#FCF9F5;
  --surface:#FFFFFF;
  --surface-2:#F1EAE2;
  --line:#E6DCD2;
  --line-soft:#EEE6DC;
  --text:#1B1817;
  --text-dim:#6B625C;
  --text-faint:#9A9088;
  --accent:#C8102E;
  --accent-bright:#A60C24;
  --accent-weak:rgba(200,16,46,.08);
  --on-accent:#FFFFFF;
  --gold:#9A781C;
  --gold-weak:rgba(154,120,28,.13);
  --green:#2E8B5E;
  --scroll-track:#F7F3EE;
  --scroll-thumb:rgba(107,98,92,.28);
  --scroll-thumb-hover:rgba(107,98,92,.42);
  --michelin:#9A781C;
  --bib:#C8102E;
  --plate:#3C7E97;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
html,body,#splash,.rank-list{
  scrollbar-width:thin;
  scrollbar-color:var(--scroll-thumb) var(--scroll-track);
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--scroll-track);}
::-webkit-scrollbar-thumb{
  background:var(--scroll-thumb);
  border:2px solid var(--scroll-track);
  border-radius:999px;
}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-hover);}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-weight:400;
  line-height:1.55;
  letter-spacing:.005em;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:var(--on-accent);}
.num,.rating,.dist,.count{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.kicker{font-size:11px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--accent-bright);}

button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
.hidden{display:none !important;}

/* ============================================================
   開場
   ============================================================ */
#splash{
  position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;
  padding:max(24px, env(safe-area-inset-top,0px)) 22px max(28px, env(safe-area-inset-bottom,0px));
  overflow-y:auto;
  background:
    linear-gradient(120deg, rgba(200,16,46,.13), transparent 34%),
    radial-gradient(130% 90% at 50% -8%, var(--bg-2) 0%, var(--bg) 55%),
    var(--bg);
  text-align:center;z-index:30;
}
.splash-shell{
  width:100%;max-width:390px;min-height:100%;display:flex;flex-direction:column;
  justify-content:center;gap:18px;padding:8px 0;
}
.splash-copy{min-width:0;}
.splash-copy .sub{margin:0 auto;}
.splash-panel{width:100%;min-width:0;}
/* 開場：位置選擇入口清單 */
.entry-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:362px;margin:0 auto;}
.entry{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 17px;border-radius:14px;background:rgba(22,18,19,.86);border:1px solid var(--line);transition:border-color var(--t),transform var(--t),background var(--t);}
.entry:hover{border-color:color-mix(in srgb, var(--accent) 55%, var(--line));background:var(--surface);}
.entry:active{transform:scale(.985);}
.entry .ic{flex:none;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);color:var(--accent-bright);}
.entry .tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.entry .tx b{font-size:15.5px;font-weight:500;letter-spacing:.02em;color:var(--text);}
.entry .tx i{font-style:normal;font-size:12px;color:var(--text-dim);letter-spacing:.02em;}
.entry .arr{flex:none;color:var(--text-faint);}
.entry:active .arr{color:var(--accent-bright);}
.entry-primary{background:var(--accent);border-color:var(--accent);box-shadow:0 12px 34px -12px rgba(200,16,46,.6);}
.entry-primary .ic{background:rgba(255,255,255,.16);color:var(--on-accent);}
.entry-primary .tx b{color:var(--on-accent);}
.entry-primary .tx i{color:rgba(255,246,243,.82);}
.entry-primary:active{filter:brightness(1.05);}

/* ============================================================
   美食排行榜
   ============================================================ */
#rankView{position:fixed;inset:0;z-index:40;background:var(--bg);display:flex;flex-direction:column;align-items:center;}
.rank-head{flex:none;display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);background:var(--bg);width:100%;max-width:480px;}
.rank-filter-btn{flex:none;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);transition:color var(--t),border-color var(--t);}
.rank-filter-btn:active{color:var(--accent-bright);border-color:var(--accent);}
@keyframes rkspin{to{transform:rotate(360deg);}}
.rank-titles{flex:1;min-width:0;display:flex;align-items:center;}
.rank-logo{display:block;width:min(158px,41vw);max-height:46px;height:auto;object-fit:contain;object-position:left center;}
.rank-version{flex:none;align-self:flex-start;margin:7px 0 0 6px;font-family:var(--mono);font-size:9px;line-height:1;color:var(--text-faint);letter-spacing:0;white-space:nowrap;}
.rank-guide{flex:none;width:100%;max-width:480px;padding:10px 18px 0;background:var(--bg);}
.guide-card{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.09);background:linear-gradient(135deg, rgba(200,16,46,.12), rgba(22,18,19,.88) 44%, rgba(8,8,9,.92));border-radius:14px;padding:10px 12px 11px;box-shadow:0 12px 32px -24px rgba(200,16,46,.55);}
.guide-card::before{content:"";position:absolute;inset:0 0 auto;height:1px;background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);opacity:.6;}
.guide-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;min-width:0;}
.guide-dot{flex:none;width:7px;height:7px;border-radius:50%;background:var(--text-faint);box-shadow:0 0 0 4px rgba(255,255,255,.04);}
.guide-title{flex:none;font-size:11px;font-weight:600;color:var(--text);letter-spacing:.08em;}
.guide-state{flex:none;font-family:var(--mono);font-size:10px;color:var(--text-faint);letter-spacing:.03em;}
.guide-message{font-size:12.5px;line-height:1.55;color:var(--text-dim);letter-spacing:.01em;}
.guide-card[data-state="working"] .guide-dot{background:var(--accent-bright);animation:guidePulse 1s ease-in-out infinite;}
.guide-card[data-state="ready"] .guide-dot{background:#4bd38d;}
.guide-card[data-state="empty"] .guide-dot{background:#f0bb4b;}
.guide-card[data-state="error"]{border-color:rgba(200,16,46,.45);}
.guide-card[data-state="error"] .guide-dot{background:var(--accent-bright);}
.guide-card[data-state="error"] .guide-message{color:var(--accent-bright);}
@keyframes guidePulse{0%,100%{transform:scale(1);box-shadow:0 0 0 4px rgba(200,16,46,.1);}50%{transform:scale(1.35);box-shadow:0 0 0 7px rgba(200,16,46,.03);}}
/* 篩選列 */
.rank-filters{flex:none;display:flex;flex-direction:column;gap:7px;padding:11px 16px 12px;border-bottom:1px solid var(--line);width:100%;max-width:480px;background:var(--bg);}
.rank-filters .fg{display:flex;align-items:center;gap:9px;}
.rank-filters .fg-lab{flex:none;width:34px;font-size:11px;color:var(--text-faint);letter-spacing:.08em;}
.rank-filters .fg-chips{flex:1;min-width:0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;}
.rank-filters .fg-chips::-webkit-scrollbar{display:none;}
.rank-filters .fg-location .fg-chips{display:grid;grid-template-columns:minmax(76px,1fr) minmax(76px,1fr) minmax(76px,1fr);overflow:visible;}
.rank-filters .fg-location .fsel{width:100%;max-width:none;}
.rank-filters .fg-keyword .fg-chips{display:grid;grid-template-columns:minmax(0,1fr);overflow:visible;}
.keyword-input{width:100%;min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:16px;padding:8px 11px;outline:none;}
.keyword-input::placeholder{color:var(--text-faint);}
.filter-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:2px 2px 0 43px;}
.keyword-apply{background:var(--accent);border:1px solid var(--accent);color:var(--on-accent);border-radius:10px;padding:8px 18px;font-size:12px;font-weight:600;min-width:72px;}
.rank-filters .fg-travel .fg-chips{align-items:center;flex-wrap:wrap;overflow:visible;}
.fchip{flex:none;font-size:12.5px;padding:5px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);transition:all var(--t);}
.fchip:active{transform:scale(.96);}
.fchip.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:500;}
.fsel{flex:none;font-family:inherit;font-size:12.5px;padding:5px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--line);color:var(--text);max-width:46%;}
.fsel:disabled{opacity:.5;}
.flocate{flex:none;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);transition:color var(--t),border-color var(--t),transform var(--t);}
.flocate:active{transform:scale(.96);color:var(--accent-bright);border-color:var(--accent);}
.flocate.locating svg{animation:rkspin .8s linear infinite;}
.origin-hint{flex-basis:100%;font-size:11px;line-height:1.35;color:var(--text-faint);padding:1px 0 0 2px;}
.filter-precision{font-size:10.5px;line-height:1.45;color:var(--text-faint);padding:2px 2px 0 43px;}
.filter-precision b{color:var(--text-dim);font-weight:500;}
.mode-hint{font-size:10.5px;line-height:1.45;color:var(--text-dim);padding:2px 2px 0 43px;}
.mode-hint b{color:var(--accent-bright);font-weight:600;}
.fclear{font-size:11.5px;color:var(--accent-bright);padding:8px 4px;}
.rank-note{padding:34px 22px;text-align:center;color:var(--text-dim);font-size:13px;line-height:1.6;}
.empty-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:12px;}
.empty-actions button{font-size:12px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:999px;padding:7px 11px;}
.detail-inner .calc-v{font-family:var(--mono);font-size:11px;color:var(--accent-bright);line-height:1.5;}
.rank-list{flex:1;overflow-y:auto;padding:14px 16px 6px;width:100%;max-width:480px;}
.rank-list .card{margin-bottom:14px;}
.rank-row{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 6px;border-bottom:1px solid var(--line);background:none;text-decoration:none;color:inherit;}
.rank-row:last-child{border-bottom:none;}
.rank-row:active{background:var(--surface);}
.rank-row .city{flex:none;width:62px;font-size:13px;font-weight:500;color:var(--accent-bright);letter-spacing:.02em;line-height:1.3;}
.rank-row .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.rank-row .nm{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-row .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);}
.rank-row .meta .star{color:var(--accent-bright);}
.rank-row .meta .bdg{font-size:10px;padding:1px 6px;border-radius:5px;border:1px solid var(--line);color:var(--text-dim);}
.rank-row .calc{font-family:var(--mono);font-size:10.5px;line-height:1.4;color:var(--text-faint);letter-spacing:.01em;}
.rank-row .score{flex:none;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:48px;padding-left:6px;}
.rank-row .score b{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:18px;font-weight:600;color:var(--accent-bright);line-height:1;}
.rank-row .score i{font-style:normal;font-size:9.5px;letter-spacing:.12em;color:var(--text-faint);}
.rank-row .crown{flex:none;color:var(--accent-bright);opacity:.9;}
.rank-row .arr{flex:none;color:var(--text-faint);}
.rank-row.loading .nm,.rank-row.loading .meta{color:var(--text-faint);}
.rank-row.empty .nm{color:var(--text-faint);}
#splash .logo{
  font-size:11px;letter-spacing:.34em;color:var(--accent-bright);
  text-transform:uppercase;font-weight:500;
}
#splash .logo::after{
  content:"";display:block;width:34px;height:1px;margin:14px auto 0;
  background:var(--accent);opacity:.75;
}
#splash h1{
  font-family:var(--serif);font-size:38px;line-height:1.12;font-weight:600;
  letter-spacing:.005em;margin:18px 0 10px;
}
#splash p.sub{color:var(--text-dim);font-size:14px;max-width:310px;line-height:1.7;}
.btn-primary{
  margin-top:34px;background:var(--accent);color:var(--on-accent);font-weight:500;
  font-size:15.5px;letter-spacing:.05em;padding:15px 34px;border-radius:999px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 12px 34px -10px rgba(200,16,46,.55);
  transition:transform var(--t),box-shadow var(--t),filter var(--t);
}
.btn-primary:active{transform:scale(.97);filter:brightness(1.06);}
.btn-text{margin-top:18px;color:var(--text-dim);font-size:13px;letter-spacing:.06em;
  text-decoration:none;border-bottom:1px solid var(--line);padding:6px 2px;
  transition:color var(--t),border-color var(--t);}
.btn-text:active,.btn-text:hover{color:var(--text);border-color:var(--accent);}

/* ============================================================
   頂部控制列
   ============================================================ */
#app{display:none;flex-direction:column;min-height:100%;}
header{
  position:sticky;top:0;z-index:20;
  background:color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line);
  padding:12px 16px;
}
.bar-row{display:flex;align-items:center;gap:9px;}
/* 控制列內容與結果區共用同一個置中欄寬，使上下對齊 */
#app > header{padding-left:0;padding-right:0;}
.head-inner{width:100%;max-width:480px;margin:0 auto;padding:0 16px;}
.scope-btn{
  flex:1;display:flex;align-items:center;gap:9px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 13px;
  font-size:14px;text-align:left;min-width:0;transition:border-color var(--t),background var(--t);
}
.scope-btn:active{border-color:var(--accent);}
.scope-btn .icon{color:var(--accent);flex:none;}
.scope-btn .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.01em;}
.scope-btn .chev{margin-left:auto;color:var(--text-faint);flex:none;}
.icon-btn{flex:none;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--text-dim);transition:border-color var(--t),color var(--t);}
.icon-btn:active{border-color:var(--accent);color:var(--accent);}
.control-drawer{margin-top:10px;border-top:1px solid var(--line-soft);padding-top:12px;}

/* 情境比較 callout */
#overview{background:linear-gradient(var(--accent-weak),var(--accent-weak)),var(--surface);
  border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:13px 15px;margin-bottom:16px;font-size:13.5px;color:var(--text);line-height:1.6;}
#overview .lab{display:block;font-size:10.5px;letter-spacing:.22em;color:var(--accent-bright);margin-bottom:6px;text-transform:uppercase;font-weight:500;}

.sorts{display:flex;gap:26px;margin-top:14px;border-bottom:1px solid var(--line-soft);padding-left:1px;}
.sort-chip{
  background:none;border:none;border-bottom:2px solid transparent;
  font-size:13px;letter-spacing:.05em;padding:0 0 10px;margin-bottom:-1px;
  color:var(--text-dim);transition:color var(--t),border-color var(--t);
}
.sort-chip[aria-pressed="true"]{color:var(--text);border-color:var(--accent);font-weight:500;}

/* 用餐時段 / 類型（可橫向捲動） */
.meal-row{display:flex;gap:7px;margin-top:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.meal-row::-webkit-scrollbar{display:none;}
.mchip{flex:none;font-size:13px;letter-spacing:.04em;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);transition:background var(--t),border-color var(--t),color var(--t);}
.mchip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:500;}
.mchip-sep{margin-left:9px;position:relative;}
.mchip-sep::before{content:"";position:absolute;left:-9px;top:6px;bottom:6px;width:1px;background:var(--line);}

.toggle-row{display:flex;align-items:center;gap:9px;margin-top:13px;font-size:12.5px;letter-spacing:.03em;color:var(--text-dim);}

/* 價位篩選 */
.filter-row{display:flex;align-items:center;gap:13px;margin-top:13px;}
.filter-lab{font-size:12.5px;letter-spacing:.03em;color:var(--text-dim);flex:none;}
.price-chips{display:flex;gap:7px;}
.pchip{font-family:var(--mono);font-size:13px;letter-spacing:1px;min-width:40px;padding:6px 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-faint);transition:background var(--t),border-color var(--t),color var(--t);}
.pchip[aria-pressed="true"]{background:var(--accent-weak);border-color:var(--accent);color:var(--accent-bright);font-weight:500;}
.switch{position:relative;width:40px;height:23px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;transition:var(--t);}
.slider::before{content:"";position:absolute;height:17px;width:17px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:var(--t);}
.switch input:checked + .slider{background:rgba(95,185,138,.28);border-color:var(--green);}
.switch input:checked + .slider::before{transform:translateX(17px);background:var(--green);}

/* 範圍面板（半徑滑桿） */
#scopePanel{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;}
#scopePanel .row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--text-dim);margin-bottom:10px;}
#scopePanel .row b{color:var(--text);font-size:15px;}
input[type=range]{width:100%;accent-color:var(--accent);height:26px;}
.panel-actions{display:flex;gap:8px;margin-top:12px;}
.panel-actions button{flex:1;padding:9px;border-radius:9px;font-size:14px;background:var(--surface-2);border:1px solid var(--line);}
.panel-actions .apply{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}

/* ============================================================
   清單 / 卡片
   ============================================================ */
main{flex:1;padding:18px 16px 104px;max-width:480px;width:100%;margin:0 auto;}
#status{color:var(--text-dim);font-size:12px;letter-spacing:.03em;padding:4px 2px 16px;display:flex;align-items:center;gap:8px;}
.spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex:none;}
@keyframes spin{to{transform:rotate(360deg);}}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,0)), var(--surface);
  border:1px solid var(--line);border-radius:16px;
  padding:18px 16px 16px;margin-bottom:14px;position:relative;overflow:hidden;
  animation:rise var(--t) ease both;transition:border-color var(--t),transform var(--t);
}
.card:first-child{border-color:rgba(200,16,46,.3);box-shadow:0 0 0 1px rgba(200,16,46,.12), 0 18px 40px -28px rgba(0,0,0,.8);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card .top{display:grid;grid-template-columns:26px minmax(0,1fr) 74px;gap:10px;align-items:flex-start;}
.rank-badge{
  flex:none;width:26px;height:30px;display:flex;align-items:flex-start;justify-content:center;
  font-family:var(--serif);font-weight:600;font-size:22px;line-height:1.1;color:var(--gold);background:none;border:none;
}
.card:nth-child(1) .rank-badge{color:var(--accent-bright);}
.head{flex:1;min-width:0;padding-top:1px;}
/* 主卡縮圖 */
.thumb{flex:none;width:70px;height:70px;border-radius:10px;object-fit:cover;background:var(--surface-2);border:1px solid var(--line);}
/* 詳情內 1–3 張餐廳照片；主卡不預留圖片高度 */
.photos{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin:0 0 2px;}
.photos.one{grid-template-columns:1fr;}
.ph-img{width:100%;min-width:0;height:118px;object-fit:cover;border-radius:11px;border:1px solid var(--line);background:var(--surface-2);transition:opacity var(--t),transform var(--t);}
.ph-img:not(.is-broken){cursor:zoom-in;}
.ph-img:not(.is-broken):active{transform:scale(.985);}
.ph-img.is-broken{display:none;}
.photos.one .ph-img{height:172px;}
.name{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.2;letter-spacing:.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px 10px;margin-top:8px;font-size:12.5px;color:var(--text-dim);letter-spacing:.02em;}
.meta.primary{margin-top:8px;}
.meta.route{margin-top:5px;color:var(--text-dim);}
.meta .dist{line-height:1.45;}
.rating{color:var(--text);font-weight:500;}
.rating .star{color:var(--gold);}
.rating-focus{flex:none;min-width:70px;border:1px solid rgba(154,120,28,.34);background:var(--gold-weak);border-radius:12px;padding:7px 7px 6px;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--gold);font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1;}
.rating-focus .score{display:flex;align-items:center;gap:3px;font-size:19px;font-weight:700;color:var(--text);}
.rating-focus .score .star{font-size:13px;color:var(--gold);}
.rating-focus .reviews{font-size:10.5px;color:var(--text-dim);white-space:nowrap;}
.open-now{color:var(--green);font-weight:500;}
.closed{color:var(--accent-bright);}
.price{letter-spacing:1.5px;color:var(--text-faint);}

/* 評鑑徽章 */
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.detail-badges{margin-top:0;}
.badge{font-size:10.5px;letter-spacing:.05em;padding:4px 10px;border-radius:999px;font-weight:500;display:inline-flex;gap:5px;align-items:center;border:1px solid transparent;text-transform:uppercase;}
.badge .yr{opacity:.6;font-size:9.5px;font-family:var(--mono);}
.badge.michelin{background:var(--gold-weak);color:var(--michelin);border-color:rgba(200,162,76,.32);}
.badge.michelin::before{content:"✦";font-size:9px;}
.badge.selected{background:rgba(200,162,76,.08);color:var(--text-dim);border-color:rgba(200,162,76,.22);}
.badge.fifty{background:rgba(255,255,255,.10);color:var(--text);border-color:rgba(255,255,255,.24);}
.badge.fifty::before{content:"50";font-size:8.5px;font-family:var(--mono);color:var(--gold);}
.badge.bib{background:rgba(236,90,106,.13);color:var(--bib);border-color:rgba(236,90,106,.3);}
.badge.plate{background:rgba(143,179,196,.12);color:var(--plate);border-color:rgba(143,179,196,.26);}
.badge.bowl{background:rgba(200,162,76,.13);color:var(--gold);border-color:rgba(200,162,76,.28);}
.badge.sweet{background:rgba(236,90,106,.11);color:var(--accent-soft);border-color:rgba(236,90,106,.26);}
.badge.greenstar{background:rgba(95,185,138,.12);color:var(--green);border-color:rgba(95,185,138,.3);}
.badge.greenstar::before{content:"★";font-size:9px;}
.badge.cert{background:rgba(95,185,138,.11);color:var(--green);border-color:rgba(95,185,138,.28);}
.badge.cert-strong{background:var(--gold-weak);color:var(--gold);border-color:rgba(200,162,76,.3);}
.badge.cert-service{background:rgba(143,179,196,.10);color:var(--plate);border-color:rgba(143,179,196,.24);}
.badge.cert::before,.badge.cert-strong::before,.badge.cert-service::before{content:"✓";font-size:10px;}
.badge.social{background:rgba(236,90,106,.12);color:var(--accent-soft);border-color:rgba(236,90,106,.28);}
.badge.social::before{content:"▶";font-size:9px;}
.badge.placeholder{display:none;}
.confidence-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.confidence-pill{font-size:10.5px;color:var(--text-dim);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:3px 7px;}
.confidence-pill b{color:var(--text);font-weight:500;}
.keyword-hits{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.social-signal{display:grid;grid-template-columns:72px 1fr;gap:12px;align-items:start;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
.social-signal .k{font-size:12px;color:var(--text-faint);}
.social-signal .v{font-size:13px;color:var(--text);line-height:1.55;}
.social-signal a{color:var(--accent-soft);text-decoration:underline;text-underline-offset:3px;}
.keyword-hit{font-size:10.5px;color:var(--text-dim);background:rgba(200,16,46,.08);border:1px solid rgba(200,16,46,.22);border-radius:999px;padding:3px 8px;}
.keyword-hit b{color:var(--accent-bright);font-weight:600;}
.card-note-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.branch-group{display:inline-flex;font-size:10.5px;color:var(--text-dim);background:rgba(143,179,196,.10);border:1px solid rgba(143,179,196,.22);border-radius:999px;padding:3px 8px;}
.distance-relaxed{display:inline-flex;font-size:10.5px;color:var(--gold);background:var(--gold-weak);border:1px solid rgba(200,162,76,.28);border-radius:999px;padding:3px 8px;}

/* 服務/供應標籤（中性灰，與彩色評鑑徽章區隔） */
.feats{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.feats.in-detail{margin-top:0;}
.feat{font-size:10.5px;letter-spacing:.04em;padding:3px 9px;border-radius:7px;background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);}

/* AI 解讀：斜體襯線引文 */
.ai-reason{
  margin-top:14px;font-family:var(--serif);font-style:italic;font-size:16px;line-height:1.5;
  color:var(--text);border-left:2px solid var(--accent);padding:2px 0 2px 14px;letter-spacing:.01em;
}
.ai-reason b{display:block;font-family:var(--sans);font-style:normal;font-size:11px;letter-spacing:.08em;color:var(--accent-bright);margin-bottom:4px;}
.ai-source{display:block;margin-top:5px;font-family:var(--sans);font-style:normal;font-size:10.5px;line-height:1.45;color:var(--text-dim);}
.ai-reason.placeholder{color:var(--text-dim);border-left-color:var(--line);}

.actions{display:grid;grid-template-columns:1.22fr .88fr 1fr;gap:9px;margin-top:16px;}
.actions button{min-width:0;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13.5px;letter-spacing:.04em;padding:11px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.012);color:var(--text);transition:border-color var(--t),background var(--t);}
.actions button:active{filter:brightness(1.08);}
.actions .nav{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}
.actions .nav:active{background:var(--accent);}
.actions .share{flex:.72;color:var(--text-dim);}
.actions .share:active{border-color:var(--accent);color:var(--accent-bright);}
.rank-route-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px;color:var(--text-dim);font-size:12px;}
.rank-route-tools button{flex:none;padding:8px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--line);color:var(--text);}
.share-hero{padding:12px 2px 16px;}
.share-hero b{display:block;color:var(--text);font-size:20px;line-height:1.35;}
.share-hero span{display:block;color:var(--text-dim);font-size:12px;margin-top:5px;}

/* 展開詳情 */
.detail{margin-top:0;max-height:0;overflow:hidden;transition:max-height var(--t) ease;}
.detail.open{max-height:1500px;}
.detail-inner .hours{line-height:1.75;}
.detail-inner .v b{color:var(--text);font-weight:600;}
.detail-inner .links a{color:var(--accent-bright);text-decoration:none;border-bottom:1px solid rgba(236,90,106,.4);}
.detail-inner .links a:active{color:var(--text);}
.detail-inner{padding-top:16px;margin-top:16px;border-top:1px solid var(--line);font-size:13px;color:var(--text-dim);display:flex;flex-direction:column;gap:10px;line-height:1.6;}
.detail-inner .ph{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:18px;text-align:center;color:var(--text-faint);font-size:12px;}
.detail-inner .photo{width:100%;height:172px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);}
.detail-inner .line{display:grid;grid-template-columns:52px minmax(0,1fr);gap:10px;padding:9px 10px;border:1px solid rgba(255,255,255,.045);background:rgba(255,255,255,.018);border-radius:10px;}
.detail-inner .line .k{color:var(--text-faint);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding-top:1px;}
.detail-inner .line .v{color:var(--text);min-width:0;}
.detail-inner .v.sum3{display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.error-state{grid-column:1 / -1;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:22px;display:grid;gap:14px;}
.error-state b{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--text);}
.error-state p{color:var(--text-dim);font-size:13.5px;line-height:1.65;margin:0;}
.error-state code{font-family:var(--mono);font-size:11.5px;color:var(--accent-bright);word-break:break-word;}
.error-actions{display:flex;gap:10px;flex-wrap:wrap;}
.error-actions button{padding:10px 14px;border-radius:10px;border:1px solid var(--line);font-size:13px;background:var(--surface-2);}
.error-actions .primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:500;}

/* ============================================================
   地圖（整頁切換）
   ============================================================ */
#fab{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(22px + env(safe-area-inset-bottom,0));z-index:25;
  background:var(--accent);border:1px solid var(--accent);color:var(--on-accent);
  border-radius:999px;padding:13px 22px;font-size:13.5px;font-weight:500;letter-spacing:.05em;
  display:flex;align-items:center;gap:8px;box-shadow:0 14px 36px -10px rgba(200,16,46,.55);transition:transform var(--t),filter var(--t);
}
#fab:active{transform:translateX(-50%) scale(.96);filter:brightness(1.06);}
#mapView{position:fixed;inset:0;z-index:28;background:var(--bg);display:flex;flex-direction:column;align-items:center;}
#mapView header{position:static;width:100%;padding-left:0;padding-right:0;}
#mapView .bar-row{width:100%;max-width:480px;margin:0 auto;padding:0 16px;}
#map{flex:1;width:100%;max-width:480px;background:var(--surface-2);}
#mapFallback{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--text-dim);font-size:14px;line-height:1.7;padding:30px;width:100%;max-width:480px;}

.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:11px 17px;border-radius:999px;font-size:13px;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.55);max-width:90vw;}

/* 選地點面板（Step 4） */
#areaModal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;}
#areaModal .sheet{background:var(--surface);border-top:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 18px calc(22px + env(safe-area-inset-bottom,0));display:flex;flex-direction:column;gap:15px;animation:rise var(--t) ease both;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--serif);font-size:20px;font-weight:600;}
#areaInput{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;font-size:16px;color:var(--text);font-family:inherit;transition:border-color var(--t);}
#areaInput::placeholder{color:var(--text-faint);}
#areaInput:focus{outline:none;border-color:var(--accent);}
.autocomplete-list{display:flex;flex-direction:column;gap:6px;margin-top:-7px;}
.autocomplete-item{width:100%;text-align:left;border:1px solid var(--line);background:var(--surface-2);color:var(--text);border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.45;font-family:inherit;}
.autocomplete-item:active{border-color:var(--accent);background:rgba(200,16,46,.14);}
.autocomplete-item small{display:block;color:var(--text-faint);font-size:11px;margin-top:2px;}
.ca-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin:-2px 0 -4px;}
.city-area{display:flex;gap:9px;}
.sel{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;font-size:15px;color:var(--text);font-family:inherit;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23A89D98' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:34px;transition:border-color var(--t);}
.sel:focus{outline:none;border-color:var(--accent);}
.sel option{background:var(--surface);color:var(--text);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chips .chip{font-size:13px;letter-spacing:.02em;padding:8px 13px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);transition:border-color var(--t),color var(--t);}
.chips .chip:active{border-color:var(--accent);color:var(--accent-bright);}
.sheet-actions{display:flex;gap:9px;margin-top:4px;}
.sheet-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;letter-spacing:.03em;background:transparent;border:1px solid var(--line);color:var(--text);}
.sheet-actions .apply{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}

/* 用地圖選位置 */
.map-pick-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--line);color:var(--text);font-size:14px;letter-spacing:.03em;transition:border-color var(--t),color var(--t);}
.map-pick-btn:active{border-color:var(--accent);color:var(--accent-bright);}
.map-pick-btn svg{color:var(--accent);}
#pickView{position:fixed;inset:0;z-index:45;background:var(--bg);display:flex;flex-direction:column;align-items:center;}
#pickView header{position:static;width:100%;padding-left:0;padding-right:0;}
#pickView .bar-row{width:100%;max-width:480px;margin:0 auto;padding:0 16px;}
#pickMap{flex:1;width:100%;max-width:480px;background:var(--surface-2);}
.pick-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);z-index:46;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.55));}
.pick-confirm{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom,0));z-index:47;background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:14px 32px;font-size:15px;font-weight:500;letter-spacing:.05em;box-shadow:0 14px 36px -10px rgba(200,16,46,.6);transition:transform var(--t),filter var(--t);}
.pick-confirm:active{transform:translateX(-50%) scale(.97);filter:brightness(1.06);}

.auth-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,.45);}
.auth-card h2{font-size:22px;line-height:1.25;margin-bottom:8px;font-weight:650;}

.auth-card button:disabled{opacity:.58;cursor:not-allowed;}
.auth-card .auth-note{margin-top:12px;font-size:11px;color:var(--text-faint);}
.auth-card .privacy-note{margin-top:8px;font-size:11px;color:var(--text-faint);line-height:1.55;}
.auth-error{display:none;margin-top:10px;padding:9px 10px;border-radius:9px;background:rgba(200,16,46,.14);border:1px solid rgba(200,16,46,.34);color:var(--accent-bright);font-size:12px;line-height:1.55;}
.auth-error.show{display:block;}
.auth-user{position:fixed;right:10px;bottom:calc(10px + env(safe-area-inset-bottom,0));z-index:65;max-width:min(260px,72vw);padding:7px 9px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:8px;}
.auth-user a{color:var(--text);text-decoration:none;}
.auth-user a:active{color:var(--accent-bright);}
.auth-user button{color:var(--accent-bright);font-size:11px;}
.photo-lightbox{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);}
.photo-lightbox.hidden{display:none;}
.photo-lightbox img{max-width:min(100%,720px);max-height:82vh;border-radius:12px;border:1px solid rgba(255,255,255,.18);box-shadow:0 24px 70px rgba(0,0,0,.55);object-fit:contain;background:#050505;}
.photo-lightbox-close{position:absolute;right:18px;top:18px;width:44px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(20,18,18,.82);color:#fff;font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;}
.photo-lightbox-caption{position:absolute;left:18px;right:18px;bottom:18px;color:rgba(255,255,255,.86);font-size:13px;line-height:1.4;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.7);}

<body>
<div class="auth-gate hidden" id="authGate">
  <div class="auth-card">
    <h2>登入在地美食榜</h2>
    <p id="authGateText">使用 Google 帳戶登入後才能查詢排行榜。任何 Google 帳戶都可使用，後台只開放管理員。</p>
    <button id="googleLoginBtn" type="button">使用 Google 登入</button>
    <div class="auth-error" id="authError"></div>
    <p class="auth-note" id="authGateNote">登入門檻已啟用。手機 Safari / Chrome 會先使用彈出式登入；內建瀏覽器才改用跳轉登入。</p>
    <p class="privacy-note">定位只用於查詢附近餐廳與估算步行/開車時間；後台記錄操作事件與定位文字標籤，不寫入精確經緯度。</p>
  </div>
</div>
<div class="auth-user hidden" id="authUser"><span id="authUserText"></span><a class="hidden" id="adminLink" href="admin.html">管理員</a><button id="logoutBtn" type="button">登出</button></div>

</div>

<!-- ============ 美食排行榜（各縣市綜合冠軍） ============ -->

<!-- ============ 主畫面 ============ -->
<div id="app">
  <header>
    <div class="head-inner">

      <button class="scope-btn" id="scopeBtn">

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </span>
        <span class="label" id="scopeLabel">目前位置</span>
        <span class="chev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </button>
      <button class="icon-btn" id="filterMenuBtn" aria-label="開啟功能與濾網" title="功能與濾網">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>

    <label class="toggle-row">

      只看營業中
    </label>

    <div class="filter-row">
      <span class="filter-lab">價位</span>
      <div class="price-chips" id="priceChips">
        <button class="pchip" data-price="1" aria-pressed="false">$</button>
        <button class="pchip" data-price="2" aria-pressed="false">$$</button>
        <button class="pchip" data-price="3" aria-pressed="false">$$$</button>
        <button class="pchip" data-price="4" aria-pressed="false">$$$$</button>
      </div>
    </div>
    </div>
    </div>
  </header>

  <main>
    <div id="status"></div>
    <div id="overview" class="hidden"></div>
    <div id="list"></div>
  </main>

  <button id="fab">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>
    地圖

</div>

           placeholder="輸入地名、地址或地標，例：台北車站、信義區" />

<div id="pickView" class="hidden">
  <header>
    <div class="bar-row">
      <button class="scope-btn" id="pickBack" style="flex:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        取消
      </button>

    </div>
  </header>
  <div id="pickMap"></div>
  <div class="pick-pin">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="#C8102E" stroke="#FFF6F3" stroke-width="1.4" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.4" fill="#FFF6F3" stroke="none"/></svg>
  </div>
  <button id="pickConfirm" class="pick-confirm">選這裡搜尋</button>

<script>
/* ============================================================
   CONFIG — 所有可調權重集中此處，改一個數字即生效
   ============================================================ */
const APP_SETTINGS = window.APP_SETTINGS || {};
const CONFIG = {
  // ── Google 金鑰：必填。資料只走真實 Google Places / Geocoding。
  //    上線前填入並設定 referrer + API 範圍限制
  GOOGLE_API_KEY: APP_SETTINGS.googleMapsApiKey || "",
  API_PROXY: {
    ENDPOINT: APP_SETTINGS.apiBaseUrl || "",
  },
  APP_CHECK: {
    SITE_KEY: APP_SETTINGS.appCheckSiteKey || "",
    DEBUG_TOKEN: APP_SETTINGS.appCheckDebugToken || false,
  },
  // 向量地圖 ID（Google Cloud 地圖管理建立）：進階標記必需，並可套雲端深色樣式
  MAP_ID: "e5fbf85715cf5a5051abcc7b",

  // ── 搜尋
  DEFAULT_RADIUS_M: 800,     // 步行半徑預設（公尺）
  RANK_WALKABLE_RADIUS_M: 800,      // 排行榜預設：定位點步行可到範圍
  RANK_WALKABLE_FALLBACK_M: 2000,   // 附近結果過少時的保底範圍
  RANK_WALK_RADIUS_STEPS_M: [800, 1200, 1600, 2000, 3000, 5000],
  RANK_DRIVE_RADIUS_STEPS_M: [3000, 5000, 8000, 12000, 20000, 30000],
  DISTRICT_RADIUS_M: 3000,   // 選「區」時的範圍：涵蓋全區、忽略步行距離
  WALK_SPEED_M_PER_MIN: 80,  // 步行速度，用來換算「步行 X 分」
  RANK_WALK_MAX_MIN: 15,     // 交通篩選：走路 15 分鐘內
  RANK_DRIVE_MAX_MIN: 30,    // 交通篩選：開車 30 分鐘內
  RANK_ROUTE_PREFETCH_COUNT: 8,
  RANK_DETAIL_PREFETCH_LIMIT: 3,
  ROUTE_TIMEOUT_MS: 7000,    // Routes API 逾時後保留直線距離估算，不阻塞畫面
  RESULT_COUNT: 3,           // 取前幾家
  DEFAULT_CENTER: { lat: 25.0421, lng: 121.5654 }, // 定位失敗時仍用真實 Google 資料搜尋的預設中心
  CACHE_TTL_MS: {
    search: 6 * 60 * 60 * 1000,
    details: 7 * 24 * 60 * 60 * 1000,
    route: 30 * 60 * 1000,
    geocode: 30 * 24 * 60 * 60 * 1000,
  },

  // ── 貝氏加權平均（C、m 之後用實際資料調校）
  //    加權分數 = (C*m + n*r) / (C + n)
  BAYES: {
    C: 150,  // 可信度門檻：評論數要多少才算「夠數」
    m: 4.0,  // 全體平均分基準值（理想上由當批結果動態計算，見 computeM）
    DYNAMIC_M: true, // true＝用當批結果平均覆蓋上面的 m
  },
  REVIEW_COUNT_BONUS: {
    SCALE: 0.06, // 評論量信心加分：同星等時評論數多者更前
    CAP: 0.32,   // 避免超大店只靠評論數壓過品質
  },

  // ── 評鑑加分（Step 2 比對後疊加；公式集中此處）
  AWARD_BONUS: {
    michelin: { "三星": 0.5, "二星": 0.4, "一星": 0.3 }, // 高權重，但仍只疊加在 Google 分數上
    michelinSelected: 0.08,     // 米其林入選：弱加分，低於星級、必比登與 500 系列
    fiftyBest: 0.45,          // 50 Best：高權重、少數店適用
    bib: 0.22,                // 必比登推介：中高權重
    platePerUnit: 0.03,       // 500 盤 / 500 碗 / 500 甜：中高權重，依單位數遞增
    plateCap: 0.35,           // 500 系列加分上限，避免壓過 Google 主體
    totalCap: 0.75,           // 外部評鑑總加分上限，Google 評分/評論數仍是主體
  },
  SOCIAL_SIGNAL_BONUS: {
    youtubeCap: 0.12,          // 社群聲量只做小加分，避免壓過 Google 評分/評論數
    socialCap: 0.10,
    platformCap: 0.08,         // 愛食記 / OpenRice / Tripadvisor 等平台口碑，僅作輔助
    mediaCap: 0.08,
    totalCap: 0.14,
    confidence: { high:1, medium:0.75, low:0.45 },
  },

  // ── 距離 / 營業 對排名的影響（綜合排序時）
  DISTANCE_PENALTY_PER_100M: 0.04, // 每 100m 扣分
  OPEN_BONUS: 0.05,                // 目前營業中加分
  MEAL_MATCH_BONUS: 0.06,          // 該店明確供應「當前時段」餐點時加分（讓時段篩選更準）

  SORT_DEFAULT: "composite",       // composite | distance | rating
  OPEN_ONLY_DEFAULT: false,        // 「只看營業中」預設

  // ── 評鑑 / 認證規則：獨立資料檔，避免徽章邏輯散在畫面程式中
  AWARDS_URL: APP_SETTINGS.awardsUrl || "assets/awards-taiwan.json",
  EXTERNAL_SIGNALS_URL: APP_SETTINGS.externalSignalsUrl || "assets/external-signals.json",
  CERT_BADGES_URL: APP_SETTINGS.certificationBadgesUrl || "assets/certification-badges.json",
  VILLAGES_URL: APP_SETTINGS.villagesUrl || "assets/taiwan-villages.json",

  // ── AI 解讀：前端不放 AI key，分類只接受後端 proxy 回傳
  AI: {
    MODE: "off",
  },
  AI_FILTER: {
    MODE: "proxy",           // off＝不用 AI 過濾｜proxy＝呼叫後端分類服務
    ENDPOINT: "",            // 後端回 {items:[{id,tags,confidence,reason,sources}]}
    MAX_ITEMS: 80,
  },
  AUTH: window.APP_FIREBASE_CONFIG || {
    requireSignIn: true,
    logUsage: true,
    adminEmails: [],
    firebase: { apiKey:"", authDomain:"", projectId:"", appId:"" },
  },
};

/* ============================================================
   用餐時段 / 類型 — 依現在時間自動推薦，亦可手動切換
   （早茶、小吃等台灣概念對應為最接近的 Google Places 類型，屬近似）
   ============================================================ */
const MEALS = {
  breakfast: { label:"早餐", types:["breakfast_restaurant","cafe","bakery"] },
  morningtea:{ label:"早茶", types:["brunch_restaurant","cafe"] },
  lunch:     { label:"午餐", types:["restaurant"] },
  afttea:    { label:"午茶", types:["cafe","dessert_shop"] },
  dinner:    { label:"晚餐", types:["restaurant"] },
  latenight: { label:"消夜", types:["bar","meal_takeaway","ramen_restaurant"] },
  snack:     { label:"小吃", types:["meal_takeaway","fast_food_restaurant"] },
  dessert:   { label:"甜點", types:["dessert_shop","ice_cream_shop","bakery"] },
  all:       { label:"不限", types:["restaurant"] },
};
function currentMealKey(){
  const h = new Date().getHours() + new Date().getMinutes()/60;
  if (h>=5 && h<10)    return "breakfast";
  if (h>=10 && h<11.5) return "morningtea";
  if (h>=11.5 && h<14) return "lunch";
  if (h>=14 && h<17)   return "afttea";
  if (h>=17 && h<21)   return "dinner";
  return "latenight"; // 21:00–05:00
}
function mealTypes(){ const m = MEALS[state.category]; return m ? m.types : ["restaurant"]; }

/* ============================================================
   狀態
   ============================================================ */
const state = {
  center: { ...CONFIG.DEFAULT_CENTER },
  radius: CONFIG.DEFAULT_RADIUS_M,
  usingArea: false,        // false=目前位置 / true=選地區
  areaName: "目前位置",
  wholeArea: false,        // 選「區」＝true：全區候選、忽略步行距離
  sort: CONFIG.SORT_DEFAULT,
  openOnly: CONFIG.OPEN_ONLY_DEFAULT,
  priceLevels: [],         // 價位篩選（空＝全部；含 1~4）
  category: "lunch",       // 用餐時段/類型（進場時依現在時間自動設定）
  raw: [],                 // 原始搜尋結果

function stableStringify(value){
  if (Array.isArray(value)) return `[${value.map(stableStringify).join(",")}]`;
  if (value && typeof value === "object"){
    return `{${Object.keys(value).sort().map(k => `${JSON.stringify(k)}:${stableStringify(value[k])}`).join(",")}}`;
  }
  return JSON.stringify(value);
}

function readApiCache(key){
  const now = Date.now();
  const mem = memoryCache.get(key);
  if (mem && mem.expiresAt > now) return mem.value;
  if (mem) memoryCache.delete(key);
  try{
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const entry = JSON.parse(raw);
    if (!entry || entry.expiresAt <= now){
      localStorage.removeItem(key);
      return null;
    }
    memoryCache.set(key, entry);
    return entry.value;
  }catch(_){
    return null;
  }
}
function writeApiCache(key, value, ttl){
  const entry = { expiresAt:Date.now() + ttl, value };
  memoryCache.set(key, entry);
  try{ localStorage.setItem(key, JSON.stringify(entry)); }catch(_){}
  return value;
}
function withoutPlaceInstance(item){
  if (!item || typeof item !== "object") return item;
  const { _place, ...rest } = item;
  return rest;
}

function cachedRequest(key, ttl, producer){
  const cached = readApiCache(key);
  if (cached != null) return Promise.resolve(cached);
  if (inflightRequests.has(key)) return inflightRequests.get(key);
  const p = Promise.resolve()
    .then(producer)
    .then(value => writeApiCache(key, value, ttl))
    .finally(() => inflightRequests.delete(key));
  inflightRequests.set(key, p);
  return p;
}

  if (code.includes("popup-closed")) return "登入視窗已關閉，請重新點選登入。";
  if (code.includes("popup-blocked")) return "瀏覽器阻擋了登入視窗，正在改用跳轉登入。";
  if (code.includes("operation-not-supported")) return "這個瀏覽器不支援彈出式登入，正在改用跳轉登入。";
  if (code.includes("redirect-cancelled") || code.includes("redirect-operation-pending")) return "已有登入流程進行中，請稍候再試。";
  if (code.includes("requests-from-referer") || message.includes("requests from referer")){
    return "Firebase 登入 API key 尚未允許這個網站來源。請到 Google Cloud Console 的 API key 限制加入 https://green-tea-king.github.io/* 與 https://green-tea-king.github.io/nearby-good-eats/*。";
  }
  if (code.includes("unauthorized-domain")) return "Firebase 尚未允許這個網域登入，請到 Authentication 加入 Authorized domains。";
  if (code.includes("operation-not-allowed")) return "Firebase 尚未啟用 Google 登入 provider。";

}

    console.info("[Auth] Firebase 尚未設定，登入與使用紀錄未啟用。");
    return;
  }
  firebase.initializeApp(CONFIG.AUTH.firebase);
  if (CONFIG.APP_CHECK.SITE_KEY && firebase.appCheck){
    if (CONFIG.APP_CHECK.DEBUG_TOKEN) self.FIREBASE_APPCHECK_DEBUG_TOKEN = CONFIG.APP_CHECK.DEBUG_TOKEN;
    authState.appCheck = firebase.appCheck();

  }
  const auth = firebase.auth();
  auth.languageCode = "zh-TW";
  authState.db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope("email");
  provider.addScope("profile");
  provider.setCustomParameters({ prompt:"select_account" });
  let hadRedirectAttempt = false;
  try{
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    hadRedirectAttempt = !!consumeAuthRedirectStarted();
    const redirectResult = await auth.getRedirectResult();
    if (redirectResult?.user) hadRedirectAttempt = false;

  $("#googleLoginBtn")?.addEventListener("click", async () => {
    showAuthError("");
    setAuthBusy(true);

      if (shouldUseRedirectLogin()){

          return;

        markAuthRedirectStarted();

      setAuthBusy(false);

  });
  $("#logoutBtn")?.addEventListener("click", async () => {

  auth.onAuthStateChanged(user => {

      showAuthError("登入沒有完成。手機請用 Safari 或 Chrome 一般分頁，不要用私密瀏覽或 LINE/FB 內建瀏覽器。");

    }
  });

}

async function appCheckHeaders(){

async function apiProxy(action, payload={}, opts={}){
  if (!hasApiProxy) throw new Error("API proxy 未設定");
  if (!authState.user?.getIdToken) throw new Error("請先登入 Google");
  const token = await authState.user.getIdToken();
  const outboundPayload = opts.quotaKey ? { ...payload, __quota:{ key:opts.quotaKey } } : payload;
  const res = await fetch(CONFIG.API_PROXY.ENDPOINT, {
    method:"POST",
    headers:{
      "content-type":"application/json",
      authorization:`Bearer ${token}`,
      ...(await appCheckHeaders()),
    },
    body:JSON.stringify({ action, payload:outboundPayload }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok){
    const err = new Error(data.error || `API proxy ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return data;
}

function activeRankTravel(){
  return rankFilter.travel || "走路";
}
function isWalkableRankMode(f=rankFilter){
  return f.travel === "走路" && !hasRankLocationFilter(f) && !!state.center;
}
function isTravelRankMode(f=rankFilter){
  return !!f.travel && !hasRankLocationFilter(f) && !!state.center;
}
function rankTravelLimitMin(travel=activeRankTravel()){
  if (travel === RANK_TRAVEL_DRIVE) return CONFIG.RANK_DRIVE_MAX_MIN;
  if (travel === RANK_TRAVEL_WALK) return CONFIG.RANK_WALK_MAX_MIN;
  return null;
}
function rankRouteMin(r, travel=activeRankTravel()){
  return travel === RANK_TRAVEL_DRIVE ? r.driveMin : r.walkMin;
}
function isWithinRankTravelLimit(r, travel=activeRankTravel()){
  const limit = rankTravelLimitMin(travel);
  if (!limit) return true;
  const routedMin = rankRouteMin(r, travel);
  if (routedMin != null) return routedMin <= limit;
  if (travel === RANK_TRAVEL_WALK && r.dist != null){
    return Math.max(1, Math.round(r.dist / CONFIG.WALK_SPEED_M_PER_MIN)) <= limit;
  }
  return false;
}
function rankTravelLimitText(travel=activeRankTravel()){
  const limit = rankTravelLimitMin(travel);
  return limit ? `${travel} ${limit} 分鐘內` : "";
}
function rankModeHintText(f=rankFilter){
  if (hasRankLocationFilter(f)){
    return `地區模式：使用 ${[f.city, f.area, f.village].filter(Boolean).join(" ")}，交通距離條件停用。`;

function setMeta(selector, attr, value){
  let el = document.head.querySelector(selector);
  if (!el){
    el = document.createElement("meta");
    if (selector.startsWith("meta[property=")) el.setAttribute("property", selector.match(/"([^"]+)"/)?.[1] || "");
    if (selector.startsWith("meta[name=")) el.setAttribute("name", selector.match(/"([^"]+)"/)?.[1] || "");
    document.head.appendChild(el);
  }
  el.setAttribute(attr, value);
}

function currentPosition(){
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("geolocation unavailable"));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat:pos.coords.latitude, lng:pos.coords.longitude }),
      reject,
      { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
    );
  });
}

function normalizeTaiwanCity(name){
  return (name || "").replace(/台/g, "臺");
}

function matchTaiwanArea(city, area){
  const normalizedCity = normalizeTaiwanCity(city);
  const matchedCity = TW_CITIES.find(c => c === normalizedCity) || "";
  const areas = TW_AREAS[matchedCity] || [];
  const matchedArea = areas.find(a => a === area) || areas.find(a => area && (a.includes(area) || area.includes(a))) || "";
  return { city:matchedCity, area:matchedArea };
}

function cityAreaFromAddress(address){
  const text = normalizeTaiwanCity(address || "");
  const city = TW_CITIES.find(c => text.includes(c)) || "";
  const area = city ? (TW_AREAS[city] || []).find(a => text.includes(a)) || "" : "";
  return { city, area };
}

async function geocodeTaiwanScope(city, area="", village=""){
  const label = [city, area, village].filter(Boolean).join("");
  if (!label) return null;
  if (rankGeocodeCache[label]) return rankGeocodeCache[label];
  const key = apiCacheKey("geocode", { label });
  try{
    const cached = readApiCache(key);
    if (cached){
      rankGeocodeCache[label] = cached;
      return cached;
    }
    let geo = null;
    if (hasApiProxy){
      geo = await apiProxy("geocode", { address:label });
    }else if (hasGoogleApiKey){
      await loadGoogle();
      const { Geocoder } = await google.maps.importLibrary("geocoding");
      const res = await new Geocoder().geocode({ address:label, region:"tw", language:"zh-TW" });
      const g = res.results?.[0];
      if (g) geo = {
        center:{ lat:g.geometry.location.lat(), lng:g.geometry.location.lng() },
        formattedAddress:g.formatted_address || "",
        placeId:g.place_id || "",
      };
    }
    if (geo?.center){
      rankGeocodeCache[label] = geo;
      writeApiCache(key, geo, CONFIG.CACHE_TTL_MS.geocode);
    }
    return geo?.center ? geo : null;
  }catch(e){
    console.warn("[地區座標] 無法 geocode：", label, e.message || e);
    rankGeocodeCache[label] = null;
    return null;
  }
}

async function loadVillageData(){
  if (villageData) return villageData;
  if (!villageDataPromise){
    villageDataPromise = fetch(CONFIG.VILLAGES_URL, { cache:"force-cache" })
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(json => {
        villageData = json.data || {};
        return villageData;
      })
      .catch(e => {
        console.warn("[村里] 載入村里資料失敗：", e.message);
        villageData = {};
        return villageData;
      });
  }
  return villageDataPromise;
}
function villagesFor(city, area){
  return villageData?.[city]?.[area] || [];
}
async function matchTaiwanVillage(city, area, geocodeResults){
  if (!city || !area) return "";
  await loadVillageData();
  const villages = villagesFor(city, area);
  if (!villages.length) return "";
  const text = (geocodeResults || []).map(r =>
    [r.formatted_address, ...(r.address_components || []).map(c => c.long_name)].filter(Boolean).join(" ")
  ).join(" ");
  return villages.find(v => text.includes(v)) || "";
}

function cityAreaFromGeocode(results){
  for (const r of results || []){
    const comp = r.address_components || [];
    const get = t => {
      const x = comp.find(c => c.types.includes(t));
      return x ? x.long_name : "";
    };
    const matched = matchTaiwanArea(
      get("administrative_area_level_1"),
      get("administrative_area_level_2") || get("administrative_area_level_3") || get("sublocality_level_1")
    );
    if (matched.city) return matched;
  }
  return { city:"", area:"" };
}

  const normalizedRaw = normalizeKeywordValue(raw);
  if (!raw || normalizedRaw.length < 4) return `place:${item.id}`;
  let base = raw
    .replace(/[（(][^）)]*(店|門市|分店|旗艦|百貨|商場|中心|館|區|市)[^）)]*[）)]/g, " ")
    .replace(/[｜|／/].*$/g, " ")
    .replace(/[-－–—].*$/g, " ")
    .replace(/\s+(台北|臺北|新北|桃園|新竹|臺中|台中|臺南|台南|高雄|基隆|宜蘭|苗栗|彰化|南投|雲林|嘉義|屏東|花蓮|臺東|台東|澎湖|金門|連江)?[\u4e00-\u9fffA-Za-z0-9]*(店|門市|分店|旗艦店|概念店|館|中心|百貨|商場)$/u, " ")
    .trim();
  const normalizedBase = normalizeKeywordValue(base);
  const changed = normalizedBase && normalizedBase !== normalizedRaw;
  if (!changed || normalizedBase.length < 4) return `place:${item.id}`;
  return `brand:${normalizedBase}`;
}
function groupRankBranches(sorted){
  const groups = new Map();
  const orderedGroups = [];
  sorted.forEach(item => {
    const key = branchGroupKey(item);
    if (key.startsWith("place:")){
      orderedGroups.push({ key, items:[item] });
      return;
    }
    if (!groups.has(key)){
      const group = { key, items:[] };
      groups.set(key, group);
      orderedGroups.push(group);
    }
    groups.get(key).items.push(item);
  });
  return orderedGroups.map(group => {
    const primary = group.items[0];
    if (group.items.length > 1){
      primary.branchGroup = {
        count:group.items.length,
        names:group.items.slice(1, 4).map(x => x.name),
      };
    }
    return primary;
  });
}
function finalizeRankCandidates(items, { sortDistance=false }={}){
  const seen = new Set();
  const all = items.filter(x => x.id && !seen.has(x.id) && seen.add(x.id));
  applyAwards(all);
  applyExternalSignals(all);
  const m = all.length ? computeM(all) : rankPoolM;
  if (all.length) rankPoolM = m;
  all.forEach(x => {
    x.bScore = bayes(x, m);
    x.aBonus = awardBonus(x.awards);
    x.rBonus = reviewCountBonus(x.count);
    x.sBonus = socialSignalBonus(x.externalSignals);
    x.composite = x.bScore + x.aBonus + x.rBonus + x.sBonus;
  });
  all.sort((a,b) => (b.composite - a.composite) || (sortDistance ? ((a.dist || 0) - (b.dist || 0)) : 0));
  return groupRankBranches(all);
}

function rankQueryTerms(f){
  const terms = RANK_FILTERS.map(g => {
    const selected = f[g.key];
    const opt = g.opts.find(o => o.label === selected);
    return opt?.query || "";
  }).filter(Boolean);
  if (String(f.keyword || "").trim()) terms.unshift(String(f.keyword).trim());
  return [...new Set(terms)];
}
const SHORT_KEYWORD_SEARCH_EXPANSIONS = {
  "牛":["牛肉麵","牛排","牛肉湯","牛肉鍋","牛肉料理"],
  "麵":["麵店","牛肉麵","乾麵","湯麵","拉麵"],
  "飯":["飯店","滷肉飯","炒飯","便當","丼飯"],
  "雞":["雞排","雞肉飯","鹹酥雞","雞湯","炸雞"],
  "魚":["魚湯","生魚片","海鮮","烤魚","魚料理"],
  "鍋":["火鍋","鍋物","涮涮鍋","麻辣鍋","牛肉鍋"],
};
function rankSearchTextQueries(f=rankFilter, { limit=0 }={}){
  const terms = rankQueryTerms(f);
  const rawKeyword = String(f.keyword || "").trim();
  const normalizedKeyword = normalizeKeywordValue(rawKeyword);
  let expansions = SHORT_KEYWORD_SEARCH_EXPANSIONS[normalizedKeyword] || [];
  if (limit > 0) expansions = expansions.slice(0, limit);
  if (!expansions.length) return [terms.join(" ")].filter(Boolean);
  const tail = terms.filter(t => normalizeKeywordValue(t) !== normalizedKeyword);
  return [...new Set(expansions.map(q => [q, ...tail].filter(Boolean).join(" ")))];
}

function rankNearbySearchPrefixes(){
  const s = rankOriginScope || {};
  const prefixes = [
    [s.city, s.area, s.village].filter(Boolean).join(""),
    [s.city, s.area].filter(Boolean).join(""),
    s.area || "",
    s.city || "",
    rankNearbySearchLabel(),
    "",
  ];
  return [...new Set(prefixes.map(x => String(x || "").replace(/\s+/g, "")).filter((x, i) => i === prefixes.length - 1 || x))];
}
function rankNearbySearchRadius(f=rankFilter, radius=CONFIG.RANK_WALKABLE_RADIUS_M){
  const steps = f.travel ? rankTravelRadiusSteps(f.travel) : [];
  return Math.max(radius, ...(steps.length ? steps : [radius]));
}
function rankNearbyTextQueries(f=rankFilter, { maxQueries=8 }={}){
  const baseQueries = rankSearchTextQueries(f).map(q => `${q} 餐廳`);
  const prefixes = rankNearbySearchPrefixes();
  const queries = [];
  for (const prefix of prefixes){
    for (const baseQuery of baseQueries){
      const q = prefix ? `${prefix} ${baseQuery}` : baseQuery;
      if (!queries.includes(q)) queries.push(q);
      if (queries.length >= maxQueries) return queries;
    }
  }
  return queries;
}

function rankTravelRadiusSteps(travel=activeRankTravel()){
  const steps = travel === RANK_TRAVEL_DRIVE
    ? CONFIG.RANK_DRIVE_RADIUS_STEPS_M
    : CONFIG.RANK_WALK_RADIUS_STEPS_M;
  return [...new Set((steps || []).filter(n => Number(n) > 0).map(n => Number(n)))].sort((a,b) => a - b);
}

function mergeRankCandidates(lists, { sortDistance=false }={}){
  const seen = new Set();
  const merged = [];
  lists.flat().forEach(item => {
    if (!item?.id || seen.has(item.id)) return;
    seen.add(item.id);
    merged.push(item);
  });
  merged.sort((a,b) => (b.composite - a.composite) || (sortDistance ? ((a.dist || 0) - (b.dist || 0)) : 0));
  return groupRankBranches(merged);
}

// 依 Google 欄位 + 類型 + 店名關鍵字做分類（無法 100% 精確，僅供篩選參考）
function classifyCandidate(o){
  const s = (o.name + " " + o.ptd + " " + o.pt).toLowerCase();
  const re = r => r.test(o.name + o.ptd) || r.test(s);
  const t = { cuisine:[], meal:[], service:[], occasion:[], diet:[] };
  // 內部分類標籤
  if (re(/chinese|cantonese|sichuan|hunan|dumpling|hot.?pot|noodle|dim.?sum|中式|中菜|中餐|台菜|台式|川菜|粵|港式|江浙|上海|湘菜|客家|熱炒|牛肉麵|餃|鍋|滷味|燒臘|點心|餛飩|麵食|羊肉|快炒/)) t.cuisine.push("中式");
  if (re(/italian|french|american|spanish|greek|steak|pizza|hamburger|mediterranean|mexican|bistro|brunch|義式|義大利|法式|法國|美式|西餐|西式|歐|牛排|排餐|披薩|pasta|地中海|漢堡|墨西哥|burger/)) t.cuisine.push("西式");
  // 時段：優先用 Google 供餐欄位，再用店名/類型/摘要近似。
  Object.keys(MEAL_FILTER_RULES).forEach(label => {

// 套用篩選 → 取前 3 → 補抓完整欄位 → 以「附近美食」卡片格式渲染

function normalizeKeywordValue(value){
  return String(value || "")
    .toLowerCase()
    .replace(/\s+/g, "")

function keywordTermVariants(term){

  variants.add(base.replace(/魯肉/g, "滷肉"));
  variants.add(base.replace(/台/g, "臺"));
  variants.add(base.replace(/臺/g, "台"));
  variants.add(base.replace(/麵線/g, "面線"));

}
function keywordSourceFields(item){
  return [
    { key:"query", label:"搜尋詞", weight:6, text:(item.queryTerms || []).join(" ") },
    { key:"name", label:"店名", weight:8, text:item.name },
    { key:"type", label:"類型", weight:5, text:[item.ptd, item.typeName, item.pt].join(" ") },
    { key:"review", label:"評論摘要", weight:4, text:item.reviewSummary },

function keywordMatchDetails(item, keyword){
  const rawTokens = rawKeywordTokens(keyword);
  const terms = rawTokens.length > 1 ? rawTokens : [String(keyword || "").trim()].filter(Boolean);
  if (!terms.length) return { ok:true, score:0, hits:[], missing:[] };
  const fields = keywordSourceFields(item);
  const hits = [];
  const missing = [];
  let score = 0;
  for (const term of terms){
    const variants = keywordTermVariants(term);
    let best = null;
    for (const f of fields){
      const found = variants.find(v => f.normalized.includes(v));
      if (!found) continue;
      const candidate = { term, source:f.label, field:f.key, score:f.weight + Math.min(found.length, 8) / 10 };
      if (!best || candidate.score > best.score) best = candidate;
    }
    if (best){
      hits.push(best);
      score += best.score;
    }else{
      missing.push(term);
    }

  return { ok:missing.length === 0, score, hits, missing };
}

}
function keywordMatch(item, keyword){
  return keywordMatchDetails(item, keyword).ok;
}

  if (!hit?.hits?.length) return "";
  const grouped = new Map();
  hit.hits.forEach(h => {
    if (!grouped.has(h.source)) grouped.set(h.source, []);
    grouped.get(h.source).push(h.term);
  });
  return `<div class="keyword-hits">` + [...grouped.entries()].map(([source, terms]) =>
    `<span class="keyword-hit"><b>${escapeHTML(source)}</b>：${escapeHTML([...new Set(terms)].join("、"))}</span>`
  ).join("") + `</div>`;
}
function relaxedKeywordValue(keyword){

  if (tokens.length <= 1) return "";
  return tokens.slice(0, -1).join(" ");
}

}

async function enrichAiFilterTags(items, f){

  if (!targets.length) return;
  try{
    const payload = {
      filters: active,
      items: targets.map(x => ({
        id:x.id, name:x.name, type:x.ptd || x.pt || "", address:x.address || "",
        rating:x.rating, count:x.count, priceLevel:x.priceLevel,
        reviewSummary:x.reviewSummary || "", editorialSummary:x.summary || "", generativeSummary:x.generativeSummary || "",
        googleFlags:{
          servesVeg:x.servesVeg===true, servesAlcohol:x.servesAlcohol===true,
          goodGroups:x.goodGroups===true, reservable:x.reservable===true,
          servesBreakfast:x.servesBreakfast===true, servesLunch:x.servesLunch===true,
          servesDinner:x.servesDinner===true, servesBrunch:x.servesBrunch===true,
          servesDessert:x.servesDessert===true, servesCoffee:x.servesCoffee===true,
        },
      })),
    };

      const res = await fetch(CONFIG.AI_FILTER.ENDPOINT, {
        method:"POST",
        headers:{
          "content-type":"application/json",
          ...(idToken ? { authorization:`Bearer ${idToken}` } : {}),
        },
        body:JSON.stringify(payload),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      data = await res.json();

    const byId = new Map((data.items || []).map(x => [x.id, x]));
    targets.forEach(x => {
      const ai = byId.get(x.id);
      if (!ai) return;
      x.aiTags = ai.tags || {};
      x.aiConfidence = ai.confidence || {};
      x.aiReason = ai.reason || "";
      x.aiSources = ai.sources || {};
      x.aiSourceLabels = [...new Set(Object.values(x.aiSources).flat().map(s => s.label).filter(Boolean))];
    });
  }catch(e){
    console.warn("[AI Filter] 後端分類失敗，改用 Google 硬欄位與搜尋詞：", e.message);
  }
}

      if (token !== rankRenderToken) return;
    }
    list = applyRankFilters(relaxedSource, true);
  }
  if (f.keyword){
    list.sort((a,b) => (keywordStrength(b, f.keyword) - keywordStrength(a, f.keyword)) || (b.composite - a.composite));
  }
  const prefetchCount = isTravelRankMode(f) ? Math.max(RANK_TOP, CONFIG.RANK_ROUTE_PREFETCH_COUNT) : RANK_TOP;
  const top = list.slice(0, prefetchCount).map(x => {
    if (!distanceRelaxed) return x;
    return Object.assign(x, {
      distanceRelaxed:true,
      distanceRelaxedFrom:CONFIG.RANK_WALKABLE_RADIUS_M,
      distanceRelaxedTo:CONFIG.RANK_WALKABLE_FALLBACK_M,
    });
  });
  if (!top.length){
    trackUsage("leaderboard_result", {
      mode:useNearby ? "walkable" : (f.city ? "area" : "pool"),
      resultCount:0,
      shownCount:0,
      city:f.city || "",
      area:f.area || "",
      village:f.village || "",
      keyword:f.keyword || "",
      meal:f.meal || "",
      travel:f.travel || "",
      open:f.open || "",
      distanceRelaxed,
    });
    const emptyText = f.keyword
      ? `找不到實際資料包含「${escapeHTML(f.keyword)}」的餐廳。關鍵字是強條件，不顯示不相干店家。`
      : (distanceRelaxed
        ? `已放寬到步行 ${CONFIG.RANK_WALKABLE_FALLBACK_M}m，仍沒有符合的餐廳。`
        : "這個條件下沒有符合的餐廳。");
    $("#rankList").innerHTML = `<div class="rank-note">${emptyText}<div class="empty-actions">
      ${f.keyword ? `<button data-empty-action="clear-keyword">取消關鍵字</button>` : ""}
      ${f.keyword && relaxedKeywordValue(f.keyword) ? `<button data-empty-action="relax-keyword">${escapeHTML(keywordRelaxLabel(f.keyword))}</button>` : ""}
      ${f.village ? `<button data-empty-action="clear-village">取消里</button>` : ""}
      ${f.area ? `<button data-empty-action="clear-area">改看全區</button>` : ""}
      ${f.service ? `<button data-empty-action="clear-service">取消吃法</button>` : ""}
      ${f.open === "營業中" ? `<button data-empty-action="open-any">不限營業</button>` : ""}
      ${f.travel === "走路" ? `<button data-empty-action="drive">改開車</button>` : ""}
      <button data-empty-action="clear-all">清除篩選</button>
    </div></div>`;
    setGuideEmpty(f.keyword
      ? `找不到包含「${f.keyword}」的真實結果。關鍵字是強因子，建議改短一點或清除關鍵字。`
      : "目前條件沒有符合店家，建議先放寬營業、地區或交通條件。");
    bindEmptyStateActions();
    return;
  }
  $("#rankList").innerHTML = `<div class="rank-note">載入前 ${top.length} 名…</div>`;
  setGuideWorking(`已找到候選店家，現在只補抓前 ${top.length} 名的詳細資料以節省 API。`);
  await ensureCertificationRules();
  await fetchRankRich(top);
  if (token !== rankRenderToken) return;   // 期間若又改了篩選，放棄這次渲染
  let cards = top.map(rankCardData);
  await enrichRankCardRoutes(cards, f.travel || activeRankTravel());
  if (token !== rankRenderToken) return;
  if (isTravelRankMode(f)){
    const beforeLimit = cards.length;
    cards = cards.filter(c => isWithinRankTravelLimit(c, f.travel)).slice(0, RANK_TOP);
    if (!cards.length){
      trackUsage("leaderboard_result", {
        mode:"route_limit",
        resultCount:list.length,
        shownCount:0,
        city:f.city || "",
        area:f.area || "",
        village:f.village || "",
        keyword:f.keyword || "",
        meal:f.meal || "",
        travel:f.travel || "",
        open:f.open || "",
        distanceRelaxed,
        routeLimitMin:rankTravelLimitMin(f.travel),
        routePrefetchCount:beforeLimit,
      });
      $("#rankList").innerHTML = `<div class="rank-note">${escapeHTML(rankTravelLimitText(f.travel))}沒有符合的餐廳。<div class="empty-actions">
        ${f.travel === RANK_TRAVEL_WALK ? `<button data-empty-action="drive">改開車</button>` : ""}
        <button data-empty-action="clear-all">清除篩選</button>
      </div></div>`;
      setGuideEmpty(`${rankTravelLimitText(f.travel)}內沒有符合店家；可以改開車或清除部分篩選。`);
      bindEmptyStateActions();
      return;
    }
  }else{
    cards = cards.slice(0, RANK_TOP);
  }
  trackUsage("leaderboard_result", {
    mode:useNearby ? "walkable" : (f.city ? "area" : "pool"),
    resultCount:list.length,
    shownCount:cards.length,
    city:f.city || "",
    area:f.area || "",
    village:f.village || "",
    keyword:f.keyword || "",
    meal:f.meal || "",
    travel:f.travel || "",
    open:f.open || "",
    distanceRelaxed,
    routeLimitMin:isTravelRankMode(f) ? rankTravelLimitMin(f.travel) : null,
    top:cards.map(c => ({
      placeId:c.id,
      name:c.name,
      rating:c.rating,
      count:c.count,
      composite:Number(c.composite?.toFixed?.(2) || 0),
    })),
  });
  $("#rankList").innerHTML = cards.map((c,i) => cardHTML(c, i+1)).join("");
  bindCardEvents($("#rankList"));
  setGuideReady(`已整理出 ${cards.length} 家。第一眼先看分數、評論量、交通時間、獎牌與熱度標籤；照片與完整資訊放在詳情內省流量。`);
}

async function fetchRankRich(cands){
  const targets = cands
    .filter(c => c?.id)
    .filter((c, i, arr) => arr.findIndex(x => x.id === c.id) === i)
    .slice(0, CONFIG.RANK_DETAIL_PREFETCH_LIMIT);
  if (targets.length) setGuideWorking(`正在補抓前 ${targets.length} 家的營業、電話、標籤與摘要；照片仍等你打開詳情才載入。`);
  if (hasApiProxy){
    await Promise.all(targets.map(async c => {
      if (rankRich[c.id]) return;
      const key = apiCacheKey("placeDetails", { placeId:c.id });
      const cached = readApiCache(key);
      if (cached){ rankRich[c.id] = cached; return; }
      try{
        const data = await apiProxy("placeDetails", { placeId:c.id });
        rankRich[c.id] = rankCandidateFromProxy(data.item || {}, {});
        writeApiCache(key, rankRich[c.id], CONFIG.CACHE_TTL_MS.details);
      }catch(_){
        rankRich[c.id] = {};
      }
    }));
    return;
  }
  await loadGoogle();
  const { Place } = await google.maps.importLibrary("places");
  await Promise.all(targets.map(async c => {
    if (rankRich[c.id]) return;
    const key = apiCacheKey("placeDetails", { placeId:c.id });
    const cached = readApiCache(key);
    if (cached){ rankRich[c.id] = cached; return; }
    try{
      const p = new Place({ id: c.id });
      await p.fetchFields({ fields:[
        "regularOpeningHours","nationalPhoneNumber","websiteURI","googleMapsURI","photos","priceRange",
        "hasDineIn","hasTakeout","hasDelivery","isReservable","hasOutdoorSeating","allowsDogs","hasLiveMusic",
        "isGoodForChildren","isGoodForGroups","hasMenuForChildren","hasRestroom",
        "accessibilityOptions","paymentOptions","parkingOptions",
        "servesVegetarianFood","servesBeer","servesWine","servesCocktails","servesBreakfast","servesLunch","servesDinner","servesBrunch","servesDessert","servesCoffee",
        "reviewSummary","editorialSummary","generativeSummary"
      ]});
      rankRich[c.id] = {
        openNow: isOpenNow(p.regularOpeningHours),
        hours: (p.regularOpeningHours?.weekdayDescriptions || []).map(toTW),
        phone: p.nationalPhoneNumber || "", website: p.websiteURI || "", mapsUri: p.googleMapsURI || "",
        priceText: toTW(priceRangeText(p.priceRange)),
        photos: (p.photos || []).slice(0,3).map(ph => ph.getURI({ maxWidth:560, maxHeight:420 })),
        dineIn:p.hasDineIn===true, takeout:p.hasTakeout===true, delivery:p.hasDelivery===true,
        reservable:p.isReservable===true, outdoor:p.hasOutdoorSeating===true,
        allowsDogs:p.allowsDogs===true, liveMusic:p.hasLiveMusic===true,
        goodKids:p.isGoodForChildren===true, goodGroups:p.isGoodForGroups===true,
        menuKids:p.hasMenuForChildren===true, restroom:p.hasRestroom===true,
        accessStr:accessText(p.accessibilityOptions), payStr:payText(p.paymentOptions), parkStr:parkText(p.parkingOptions),
        servesVeg:p.servesVegetarianFood===true,
        servesAlcohol:(p.servesBeer===true||p.servesWine===true||p.servesCocktails===true),
        servesBreakfast:p.servesBreakfast===true,
        servesLunch:p.servesLunch===true,
        servesDinner:p.servesDinner===true,
        servesBrunch:p.servesBrunch===true,
        servesDessert:p.servesDessert===true,
        servesCoffee:p.servesCoffee===true,
        reviewSummary: toTW(extractReviewSummary(p.reviewSummary)),
        summary: toTW(extractEditorial(p.editorialSummary)),
        generativeSummary: toTW(extractGenerativeSummary(p.generativeSummary)),
      };
      writeApiCache(key, rankRich[c.id], CONFIG.CACHE_TTL_MS.details);
    }catch(_){ rankRich[c.id] = {}; }
  }));
}

function rankCardData(c){
  const rich = rankRich[c.id] || {};
  const C = CONFIG.BAYES.C, m = Math.round(rankPoolM*100)/100, n = c.count.toLocaleString();
  const formula = `貝氏 (${C}×${m}＋${n}×${c.rating.toFixed(1)})÷(${C}＋${n}) ＝ ${c.bScore.toFixed(2)}`
    + (c.rBonus>0 ? `，＋評論量 ${c.rBonus.toFixed(2)}` : ``)
    + (c.aBonus>0 ? `，＋評鑑 ${c.aBonus.toFixed(2)}` : ``)
    + (c.sBonus>0 ? `，＋熱度 ${c.sBonus.toFixed(2)}` : ``)
    + `，綜合 ${c.composite.toFixed(2)}`;
  return Object.assign({
    id:c.id, name:c.name, rating:c.rating, count:c.count, priceLevel:c.priceLevel,
    address:c.address, loc:c.loc || {lat:0,lng:0}, awards:c.awards, typeName:c.ptd,
    dist:c.loc ? Math.round(distanceM(state.center, c.loc)) : null, lbCity:c.city, composite:c.composite, lbFormula:formula, aiReason:c.aiReason || "",
    socialBonus:c.sBonus || 0,
    externalSignals:c.externalSignals || [],
    socialSignal:c.socialSignal || null,
    reviewSummary:c.reviewSummary || "", summary:c.summary || "", generativeSummary:c.generativeSummary || "",
    keywordHit:c.keywordHit || null,
    branchGroup:c.branchGroup || null,
    aiTags:c.aiTags || {},
    aiConfidence:c.aiConfidence || {},
    aiSources:c.aiSources || {},
    aiSourceLabels:c.aiSourceLabels || [],
    distanceRelaxed:c.distanceRelaxed === true,
    distanceRelaxedFrom:c.distanceRelaxedFrom || null,
    distanceRelaxedTo:c.distanceRelaxedTo || null,
  }, rich);
}

function routeModeSpec(travel=activeRankTravel()){
  return travel === RANK_TRAVEL_DRIVE
    ? { apiMode:"DRIVING", prefix:"drive" }
    : { apiMode:"WALKING", prefix:"walk" };
}
function routeTargetKey(targets){
  return targets.map(r => r.id || roundedCoordKey(r.loc, 5)).join("|");
}
async function routeItemsCached(targets, travel=activeRankTravel()){
  const spec = routeModeSpec(travel);
  const key = apiCacheKey("routeMatrix", {
    origin:roundedCoordKey(state.center, 4),
    mode:spec.apiMode,
    targets:routeTargetKey(targets),
  });
  return cachedRequest(key, CONFIG.CACHE_TTL_MS.route, async () => {
    if (hasApiProxy){
      const data = await apiProxy("routeMatrix", { origin:state.center, targets:targets.map(r => r.loc), travelMode:spec.apiMode });
      return data.items || [];
    }
    await loadGoogle();
    return routeMatrixItems(targets, spec.apiMode)
      .catch(() => distanceMatrixItems(targets, google.maps.TravelMode[spec.apiMode]));
  });
}

async function enrichRankCardRoutes(cards, travel=activeRankTravel()){
  const targets = cards.filter(r => r.loc && r.dist != null);
  if (!targets.length || !hasDataApi) return;
  try{
    const spec = routeModeSpec(travel);
    const items = await routeItemsCached(targets, travel);
    applyRouteItems(items, targets, spec.prefix);
  }catch(e){
    console.warn("[排行榜路線] Google 路線時間取得失敗，保留直線距離估算：", e.message);
  }
}

let cardPhotoObserver = null;
function loadDetailPhotos(card){
  const imgs = [...card.querySelectorAll(".detail img[data-lazy-src]")];
