<style>
/* ============================================================
   設計 tokens（暗色，集中於 CSS variables；將來加淺色模式只需多定義一組）
   ============================================================ */
:root{
  --bg:#0E0C0D;            /* 深暖黑 */
  --bg-2:#15100F;          /* 開場漸層 */
  --surface:#161213;       /* 卡片 */
  --surface-2:#1F1819;     /* 展開／次層 */
  --line:#2B2225;          /* 細線 */
  --line-soft:#221B1D;     /* 更淡的線 */
  --text:#F2ECE6;          /* 暖白 */
  --text-dim:#A89D98;      /* 次要 */
  --text-faint:#776B67;    /* 更弱（標籤） */
  --accent:#C8102E;        /* 米其林紅 */
  --accent-bright:#EC5A6A; /* 紅字（暗底上對比夠） */
  --accent-weak:rgba(200,16,46,.13);
  --on-accent:#FFF6F3;     /* 紅底上的文字 */
  --gold:#C8A24C;          /* 星金 */
  --gold-weak:rgba(200,162,76,.15);
  --green:#5FB98A;         /* 營業中 */
  /* 評鑑徽章 */
  --michelin:#D8B25E;      /* 米其林＝金 */
  --bib:#EC5A6A;           /* 必比登＝紅 */
  --plate:#8FB3C4;         /* 500盤＝霧藍 */
  --radius:15px;
  --radius-sm:9px;
  --t:220ms;
  --serif:"Cormorant Garamond","Noto Serif TC",Georgia,"Times New Roman",serif;
  --sans:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"Space Grotesk","Noto Sans TC",sans-serif;
}
/* 淺色模式：米其林官網式編輯白（tokens 集中，切換即生效） */
:root[data-theme="light"]{
  --bg:#F7F3EE;
  --bg-2:#FCF9F5;
  --surface:#FFFFFF;
  --surface-2:#F1EAE2;
  --line:#E6DCD2;
  --line-soft:#EEE6DC;
  --text:#1B1817;
  --text-dim:#6B625C;
  --text-faint:#9A9088;
  --accent:#C8102E;
  --accent-bright:#A60C24;
  --accent-weak:rgba(200,16,46,.08);
  --on-accent:#FFFFFF;
  --gold:#9A781C;
  --gold-weak:rgba(154,120,28,.13);
  --green:#2E8B5E;
  --michelin:#9A781C;
  --bib:#C8102E;
  --plate:#3C7E97;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-weight:400;
  line-height:1.55;
  letter-spacing:.005em;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:var(--on-accent);}
.num,.rating,.dist,.count{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.kicker{font-size:11px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:var(--accent-bright);}

button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
.hidden{display:none !important;}

/* ============================================================
   開場
   ============================================================ */
#splash{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;padding:40px 30px;
  background:radial-gradient(130% 90% at 50% -8%, var(--bg-2) 0%, var(--bg) 55%), var(--bg);
  text-align:center;z-index:30;
}
#splash .logo{
  font-size:11px;letter-spacing:.34em;color:var(--accent-bright);
  text-transform:uppercase;font-weight:500;
}
#splash .logo::after{
  content:"";display:block;width:34px;height:1px;margin:14px auto 0;
  background:var(--accent);opacity:.75;
}
#splash h1{
  font-family:var(--serif);font-size:40px;line-height:1.12;font-weight:600;
  letter-spacing:.005em;margin:20px 0 14px;
}
#splash p.sub{color:var(--text-dim);font-size:14.5px;max-width:312px;line-height:1.7;}
.btn-primary{
  margin-top:34px;background:var(--accent);color:var(--on-accent);font-weight:500;
  font-size:15.5px;letter-spacing:.05em;padding:15px 34px;border-radius:999px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 12px 34px -10px rgba(200,16,46,.55);
  transition:transform var(--t),box-shadow var(--t),filter var(--t);
}
.btn-primary:active{transform:scale(.97);filter:brightness(1.06);}
.btn-text{margin-top:18px;color:var(--text-dim);font-size:13px;letter-spacing:.06em;
  text-decoration:none;border-bottom:1px solid var(--line);padding:6px 2px;
  transition:color var(--t),border-color var(--t);}
.btn-text:active,.btn-text:hover{color:var(--text);border-color:var(--accent);}

/* ============================================================
   頂部控制列
   ============================================================ */
#app{display:none;flex-direction:column;min-height:100%;}
header{
  position:sticky;top:0;z-index:20;
  background:color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter:blur(14px) saturate(1.2);border-bottom:1px solid var(--line);
  padding:12px 16px;
}
.bar-row{display:flex;align-items:center;gap:9px;}
.scope-btn{
  flex:1;display:flex;align-items:center;gap:9px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 13px;
  font-size:14px;text-align:left;min-width:0;transition:border-color var(--t),background var(--t);
}
.scope-btn:active{border-color:var(--accent);}
.scope-btn .icon{color:var(--accent);flex:none;}
.scope-btn .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.01em;}
.scope-btn .chev{margin-left:auto;color:var(--text-faint);flex:none;}
.icon-btn{flex:none;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--text-dim);transition:border-color var(--t),color var(--t);}
.icon-btn:active{border-color:var(--accent);color:var(--accent);}

/* 情境比較 callout */
#overview{background:linear-gradient(var(--accent-weak),var(--accent-weak)),var(--surface);
  border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  padding:13px 15px;margin-bottom:16px;font-size:13.5px;color:var(--text);line-height:1.6;}
#overview .lab{display:block;font-size:10.5px;letter-spacing:.22em;color:var(--accent-bright);margin-bottom:6px;text-transform:uppercase;font-weight:500;}

.sorts{display:flex;gap:26px;margin-top:14px;border-bottom:1px solid var(--line-soft);padding-left:1px;}
.sort-chip{
  background:none;border:none;border-bottom:2px solid transparent;
  font-size:13px;letter-spacing:.05em;padding:0 0 10px;margin-bottom:-1px;
  color:var(--text-dim);transition:color var(--t),border-color var(--t);
}
.sort-chip[aria-pressed="true"]{color:var(--text);border-color:var(--accent);font-weight:500;}

/* 用餐時段 / 類型（可橫向捲動） */
.meal-row{display:flex;gap:7px;margin-top:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.meal-row::-webkit-scrollbar{display:none;}
.mchip{flex:none;font-size:13px;letter-spacing:.04em;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-dim);transition:background var(--t),border-color var(--t),color var(--t);}
.mchip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:500;}
.mchip-sep{margin-left:9px;position:relative;}
.mchip-sep::before{content:"";position:absolute;left:-9px;top:6px;bottom:6px;width:1px;background:var(--line);}

.toggle-row{display:flex;align-items:center;gap:9px;margin-top:13px;font-size:12.5px;letter-spacing:.03em;color:var(--text-dim);}

/* 價位篩選 */
.filter-row{display:flex;align-items:center;gap:13px;margin-top:13px;}
.filter-lab{font-size:12.5px;letter-spacing:.03em;color:var(--text-dim);flex:none;}
.price-chips{display:flex;gap:7px;}
.pchip{font-family:var(--mono);font-size:13px;letter-spacing:1px;min-width:40px;padding:6px 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--text-faint);transition:background var(--t),border-color var(--t),color var(--t);}
.pchip[aria-pressed="true"]{background:var(--accent-weak);border-color:var(--accent);color:var(--accent-bright);font-weight:500;}
.switch{position:relative;width:40px;height:23px;flex:none;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;transition:var(--t);}
.slider::before{content:"";position:absolute;height:17px;width:17px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:var(--t);}
.switch input:checked + .slider{background:rgba(95,185,138,.28);border-color:var(--green);}
.switch input:checked + .slider::before{transform:translateX(17px);background:var(--green);}

/* 範圍面板（半徑滑桿） */
#scopePanel{margin-top:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;}
#scopePanel .row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--text-dim);margin-bottom:10px;}
#scopePanel .row b{color:var(--text);font-size:15px;}
input[type=range]{width:100%;accent-color:var(--accent);height:26px;}
.panel-actions{display:flex;gap:8px;margin-top:12px;}
.panel-actions button{flex:1;padding:9px;border-radius:9px;font-size:14px;background:var(--surface-2);border:1px solid var(--line);}
.panel-actions .apply{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}

/* ============================================================
   清單 / 卡片
   ============================================================ */
main{flex:1;padding:18px 16px 104px;max-width:680px;width:100%;margin:0 auto;}
#status{color:var(--text-dim);font-size:12px;letter-spacing:.03em;padding:4px 2px 16px;display:flex;align-items:center;gap:8px;}
.spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex:none;}
@keyframes spin{to{transform:rotate(360deg);}}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;position:relative;overflow:hidden;
  animation:rise var(--t) ease both;transition:border-color var(--t),transform var(--t);
}
.card:first-child{border-color:rgba(200,16,46,.3);box-shadow:0 0 0 1px rgba(200,16,46,.12), 0 18px 40px -28px rgba(0,0,0,.8);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card .top{display:flex;gap:14px;align-items:flex-start;}
.rank-badge{
  flex:none;width:30px;height:30px;display:flex;align-items:flex-start;justify-content:center;
  font-family:var(--serif);font-weight:600;font-size:24px;line-height:1;color:var(--gold);background:none;border:none;
}
.card:nth-child(1) .rank-badge{color:var(--accent-bright);}
.head{flex:1;min-width:0;padding-top:1px;}
/* 主卡縮圖 */
.thumb{flex:none;width:70px;height:70px;border-radius:10px;object-fit:cover;background:var(--surface-2);border:1px solid var(--line);}
.name{font-family:var(--serif);font-size:22px;font-weight:600;line-height:1.18;letter-spacing:.005em;}
.meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;margin-top:8px;font-size:12.5px;color:var(--text-dim);letter-spacing:.02em;}
.rating{color:var(--text);font-weight:500;}
.rating .star{color:var(--gold);}
.open-now{color:var(--green);font-weight:500;}
.closed{color:var(--accent-bright);}
.price{letter-spacing:1.5px;color:var(--text-faint);}

/* 評鑑徽章 */
.badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.badge{font-size:10.5px;letter-spacing:.05em;padding:4px 10px;border-radius:999px;font-weight:500;display:inline-flex;gap:5px;align-items:center;border:1px solid transparent;text-transform:uppercase;}
.badge .yr{opacity:.6;font-size:9.5px;font-family:var(--mono);}
.badge.michelin{background:var(--gold-weak);color:var(--michelin);border-color:rgba(200,162,76,.32);}
.badge.michelin::before{content:"✦";font-size:9px;}
.badge.bib{background:rgba(236,90,106,.13);color:var(--bib);border-color:rgba(236,90,106,.3);}
.badge.plate{background:rgba(143,179,196,.12);color:var(--plate);border-color:rgba(143,179,196,.26);}
.badge.placeholder{display:none;}

/* AI 上榜理由：斜體襯線引文 */
.ai-reason{
  margin-top:14px;font-family:var(--serif);font-style:italic;font-size:16px;line-height:1.5;
  color:var(--text);border-left:2px solid var(--accent);padding:2px 0 2px 14px;letter-spacing:.01em;
}
.ai-reason.placeholder{color:var(--text-dim);border-left-color:var(--line);}

.actions{display:flex;gap:9px;margin-top:16px;}
.actions button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13.5px;letter-spacing:.04em;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--line);background:transparent;color:var(--text);transition:border-color var(--t),background var(--t);}
.actions button:active{filter:brightness(1.08);}
.actions .nav{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}
.actions .nav:active{background:var(--accent);}

/* 展開詳情 */
.detail{margin-top:0;max-height:0;overflow:hidden;transition:max-height var(--t) ease;}
.detail.open{max-height:560px;}
.detail-inner{padding-top:16px;margin-top:16px;border-top:1px solid var(--line);font-size:13px;color:var(--text-dim);display:flex;flex-direction:column;gap:10px;line-height:1.6;}
.detail-inner .ph{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:18px;text-align:center;color:var(--text-faint);font-size:12px;}
.detail-inner .photo{width:100%;height:172px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:var(--surface-2);}
.detail-inner .line{display:flex;gap:10px;}
.detail-inner .line .k{color:var(--text-faint);flex:none;width:48px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding-top:1px;}
.detail-inner .line .v{color:var(--text);}

/* ============================================================
   地圖（整頁切換）
   ============================================================ */
#fab{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(22px + env(safe-area-inset-bottom,0));z-index:25;
  background:var(--accent);border:1px solid var(--accent);color:var(--on-accent);
  border-radius:999px;padding:13px 22px;font-size:13.5px;font-weight:500;letter-spacing:.05em;
  display:flex;align-items:center;gap:8px;box-shadow:0 14px 36px -10px rgba(200,16,46,.55);transition:transform var(--t),filter var(--t);
}
#fab:active{transform:translateX(-50%) scale(.96);filter:brightness(1.06);}
#mapView{position:fixed;inset:0;z-index:28;background:var(--bg);display:flex;flex-direction:column;}
#mapView header{position:static;}
#map{flex:1;background:var(--surface-2);}
#mapFallback{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--text-dim);font-size:14px;line-height:1.7;padding:30px;}

.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:11px 17px;border-radius:999px;font-size:13px;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.55);max-width:90vw;}

.demo-tag{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-bright);border:1px solid rgba(200,16,46,.4);border-radius:999px;padding:2px 8px;margin-left:9px;}

/* 選地點面板（Step 4） */
#areaModal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);display:flex;align-items:flex-end;}
#areaModal .sheet{background:var(--surface);border-top:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;padding:22px 18px calc(22px + env(safe-area-inset-bottom,0));display:flex;flex-direction:column;gap:15px;animation:rise var(--t) ease both;}
@media(min-width:560px){#areaModal{align-items:center;justify-content:center;}#areaModal .sheet{max-width:460px;border-radius:18px;border:1px solid var(--line);}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--serif);font-size:20px;font-weight:600;}
#areaInput{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;color:var(--text);font-family:inherit;transition:border-color var(--t);}
#areaInput::placeholder{color:var(--text-faint);}
#areaInput:focus{outline:none;border-color:var(--accent);}
.ca-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin:-2px 0 -4px;}
.city-area{display:flex;gap:9px;}
.sel{flex:1;min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 13px;font-size:15px;color:var(--text);font-family:inherit;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23A89D98' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:34px;transition:border-color var(--t);}
.sel:focus{outline:none;border-color:var(--accent);}
.sel option{background:var(--surface);color:var(--text);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chips .chip{font-size:13px;letter-spacing:.02em;padding:8px 13px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--text-dim);transition:border-color var(--t),color var(--t);}
.chips .chip:active{border-color:var(--accent);color:var(--accent-bright);}
.sheet-actions{display:flex;gap:9px;margin-top:4px;}
.sheet-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;letter-spacing:.03em;background:transparent;border:1px solid var(--line);color:var(--text);}
.sheet-actions .apply{background:var(--accent);color:var(--on-accent);font-weight:500;border-color:var(--accent);}

/* 用地圖選位置 */
.map-pick-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--line);color:var(--text);font-size:14px;letter-spacing:.03em;transition:border-color var(--t),color var(--t);}
.map-pick-btn:active{border-color:var(--accent);color:var(--accent-bright);}
.map-pick-btn svg{color:var(--accent);}
#pickView{position:fixed;inset:0;z-index:45;background:var(--bg);display:flex;flex-direction:column;}
#pickView header{position:static;}
#pickMap{flex:1;background:var(--surface-2);}
.pick-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);z-index:46;pointer-events:none;filter:drop-shadow(0 4px 6px rgba(0,0,0,.55));}
.pick-confirm{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom,0));z-index:47;background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:14px 32px;font-size:15px;font-weight:500;letter-spacing:.05em;box-shadow:0 14px 36px -10px rgba(200,16,46,.6);transition:transform var(--t),filter var(--t);}
.pick-confirm:active{transform:translateX(-50%) scale(.97);filter:brightness(1.06);}
</style>
</head>
<body>

<!-- ============ 開場 ============ -->
<section id="splash">
  <div class="logo">台北 · 步行美食指南</div>
  <h1>走幾步<br>就吃到好的</h1>
  <p class="sub">以你所在的位置，精選步行可達、口碑與評鑑兼具的前五家。</p>
  <button class="btn-primary" id="btnLocate">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
    找我附近的餐廳
  </button>
  <button class="btn-text" id="btnPickArea">或選地區</button>
</section>

<!-- ============ 主畫面 ============ -->
<div id="app">
  <header>
    <div class="bar-row">
      <button class="scope-btn" id="scopeBtn">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </span>
        <span class="label" id="scopeLabel">目前位置</span>
        <span class="chev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </button>
      <button class="icon-btn" id="themeBtn" aria-label="切換明暗主題" title="切換明暗主題">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
    </div>

    <!-- 範圍面板（含半徑滑桿，預設收起） -->
    <div id="scopePanel" class="hidden">
      <div class="row"><span>步行搜尋半徑</span><b><span id="radiusVal">800</span> 公尺</b></div>
      <input type="range" id="radius" min="200" max="2000" step="100" value="800" />
      <div class="row" style="margin:8px 0 0;"><span>約步行 <span id="walkMin">10</span> 分鐘</span><span id="scopeMode">以目前位置為圓心</span></div>
      <div class="panel-actions">
        <button id="useArea">改選地區</button>
        <button class="apply" id="applyScope">套用</button>
      </div>
    </div>

    <div class="sorts" role="group" aria-label="排序">
      <button class="sort-chip" data-sort="composite" aria-pressed="true">綜合</button>
      <button class="sort-chip" data-sort="distance" aria-pressed="false">距離</button>
      <button class="sort-chip" data-sort="rating" aria-pressed="false">評分</button>
    </div>

    <div class="meal-row" id="mealChips" role="group" aria-label="用餐時段">
      <button class="mchip" data-cat="breakfast">早餐</button>
      <button class="mchip" data-cat="morningtea">早茶</button>
      <button class="mchip" data-cat="lunch">午餐</button>
      <button class="mchip" data-cat="afttea">午茶</button>
      <button class="mchip" data-cat="dinner">晚餐</button>
      <button class="mchip" data-cat="latenight">消夜</button>
      <button class="mchip mchip-sep" data-cat="snack">小吃</button>
      <button class="mchip" data-cat="dessert">甜點</button>
      <button class="mchip" data-cat="all">不限</button>
    </div>

    <label class="toggle-row">
      <span class="switch"><input type="checkbox" id="openOnly" /><span class="slider"></span></span>
      只看營業中
    </label>

    <div class="filter-row">
      <span class="filter-lab">價位</span>
      <div class="price-chips" id="priceChips">
        <button class="pchip" data-price="1" aria-pressed="false">$</button>
        <button class="pchip" data-price="2" aria-pressed="false">$$</button>
        <button class="pchip" data-price="3" aria-pressed="false">$$$</button>
        <button class="pchip" data-price="4" aria-pressed="false">$$$$</button>
      </div>
    </div>
  </header>

  <main>
    <div id="status"></div>
    <div id="overview" class="hidden"></div>
    <div id="list"></div>
  </main>

  <button id="fab">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>
    地圖
  </button>
</div>

<!-- ============ 地圖（整頁） ============ -->
<div id="mapView" class="hidden">
  <header>
    <div class="bar-row">
      <button class="scope-btn" id="backToList" style="flex:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        清單
      </button>
      <span style="color:var(--text-dim);font-size:13px;">前五家位置</span>
    </div>
  </header>
  <div id="map"></div>
  <div id="mapFallback" class="hidden"></div>
</div>

<!-- ============ 選地點 / 地區 ============ -->
<div id="areaModal" class="hidden">
  <div class="sheet">
    <div class="sheet-head">
      <span>選地點 / 地區</span>
      <button id="areaClose" class="icon-btn" aria-label="關閉" style="width:34px;height:34px;">✕</button>
    </div>
    <input id="areaInput" type="text" inputmode="search" autocomplete="off"
           placeholder="輸入地名、地址或地標，例：台北車站、信義區" />
    <div class="ca-label">或選 縣市 → 區域</div>
    <div class="city-area">
      <select id="citySel" class="sel" aria-label="縣市"></select>
      <select id="areaSel" class="sel" aria-label="區域"><option value="">區域</option></select>
    </div>
    <button id="btnMapPick" class="map-pick-btn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg>
      用地圖選位置
    </button>
    <div class="sheet-actions">
      <button id="areaCurrent">用目前位置</button>
      <button id="areaGo" class="apply">搜尋這裡</button>
    </div>
  </div>
</div>

<!-- ============ 用地圖選位置 ============ -->
<div id="pickView" class="hidden">
  <header>
    <div class="bar-row">
      <button class="scope-btn" id="pickBack" style="flex:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        取消
      </button>
      <span style="color:var(--text-dim);font-size:13px;">移動地圖，把中心對準想找的位置</span>
    </div>
  </header>
  <div id="pickMap"></div>
  <div class="pick-pin">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="#C8102E" stroke="#FFF6F3" stroke-width="1.4" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-12a7 7 0 1 1 14 0c0 5.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.4" fill="#FFF6F3" stroke="none"/></svg>
  </div>
  <button id="pickConfirm" class="pick-confirm">選這裡搜尋</button>
</div>

<script>
/* ============================================================
   CONFIG — 所有可調權重集中此處，改一個數字即生效
   ============================================================ */
const CONFIG = {
  // ── Google 金鑰：留空字串＝啟用 demo 假資料模式（骨架可立即預覽）
  //    上線前填入並設定 referrer + API 範圍限制
  GOOGLE_API_KEY: "AIzaSyDjO79KBBzCxFx_Xc2aK4umJULdQCefPDY",
  // 向量地圖 ID（Google Cloud 地圖管理建立）：進階標記必需，並可套雲端深色樣式
  MAP_ID: "e5fbf85715cf5a5051abcc7b",

  // ── 搜尋
  DEFAULT_RADIUS_M: 800,     // 步行半徑預設（公尺）
  DISTRICT_RADIUS_M: 3000,   // 選「區」時的範圍：涵蓋全區、忽略步行距離
  WALK_SPEED_M_PER_MIN: 80,  // 步行速度，用來換算「步行 X 分」
  RESULT_COUNT: 5,           // 取前幾家
  DEFAULT_CENTER: { lat: 25.0421, lng: 121.5654 }, // 預設地點（demo / 定位失敗時）：台北市中心

  // ── 貝氏加權平均（C、m 之後用實際資料調校）
  //    加權分數 = (C*m + n*r) / (C + n)
  BAYES: {
    C: 150,  // 可信度門檻：評論數要多少才算「夠數」（demo 值，上線用實際資料調校）
    m: 4.0,  // 全體平均分基準值（理想上由當批結果動態計算，見 computeM）
    DYNAMIC_M: true, // true＝用當批結果平均覆蓋上面的 m
  },

  // ── 評鑑加分（Step 2 比對後疊加；公式集中此處）
  AWARD_BONUS: {
    michelin: { "三星": 0.5, "二星": 0.4, "一星": 0.3 },
    bib: 0.2,                 // 必比登推介
    platePerUnit: 0.03,       // 500 盤每盤加分
    plateCap: 0.4,            // 500 盤加分上限
  },

  // ── 距離 / 營業 對排名的影響（綜合排序時）
  DISTANCE_PENALTY_PER_100M: 0.04, // 每 100m 扣分
  OPEN_BONUS: 0.05,                // 目前營業中加分

  SORT_DEFAULT: "composite",       // composite | distance | rating
  OPEN_ONLY_DEFAULT: false,        // 「只看營業中」預設

  // ── 評鑑名單（Step 2）：獨立 JSON 檔（做法 1）；file:// 預覽時 fetch 失敗會自動退回內嵌備援
  AWARDS_URL: "awards-taipei.json",

  // ── AI 解讀（Step 3）
  AI: {
    MODE: "demo",            // demo＝規則產生（免金鑰，立即可看）｜ live＝呼叫 Claude
    API_KEY: "",             // live 模式才需要；上線請走後端代理，勿把金鑰放前端
    MODEL: "claude-sonnet-4-6",
  },
};

/* ============================================================
   用餐時段 / 類型 — 依現在時間自動推薦，亦可手動切換
   （早茶、小吃等台灣概念對應為最接近的 Google Places 類型，屬近似）
   ============================================================ */
const MEALS = {
  breakfast: { label:"早餐", types:["breakfast_restaurant","cafe","bakery"] },
  morningtea:{ label:"早茶", types:["brunch_restaurant","cafe"] },
  lunch:     { label:"午餐", types:["restaurant"] },
  afttea:    { label:"午茶", types:["cafe","dessert_shop"] },
  dinner:    { label:"晚餐", types:["restaurant"] },
  latenight: { label:"消夜", types:["bar","meal_takeaway","ramen_restaurant"] },
  snack:     { label:"小吃", types:["meal_takeaway","fast_food_restaurant"] },
  dessert:   { label:"甜點", types:["dessert_shop","ice_cream_shop","bakery"] },
  all:       { label:"不限", types:["restaurant"] },
};
function currentMealKey(){
  const h = new Date().getHours() + new Date().getMinutes()/60;
  if (h>=5 && h<10)    return "breakfast";
  if (h>=10 && h<11.5) return "morningtea";
  if (h>=11.5 && h<14) return "lunch";
  if (h>=14 && h<17)   return "afttea";
  if (h>=17 && h<21)   return "dinner";
  return "latenight"; // 21:00–05:00
}
function mealTypes(){ const m = MEALS[state.category]; return m ? m.types : ["restaurant"]; }

/* ============================================================
   狀態
   ============================================================ */
const state = {
  center: { ...CONFIG.DEFAULT_CENTER },
  radius: CONFIG.DEFAULT_RADIUS_M,
  usingArea: false,        // false=目前位置 / true=選地區
  areaName: "目前位置",
  wholeArea: false,        // 選「區」＝true：全區候選、忽略步行距離
  sort: CONFIG.SORT_DEFAULT,
  openOnly: CONFIG.OPEN_ONLY_DEFAULT,
  priceLevels: [],         // 價位篩選（空＝全部；含 1~4）
  category: "lunch",       // 用餐時段/類型（進場時依現在時間自動設定）
  raw: [],                 // 原始搜尋結果
  ranked: [],              // 排名後前五
  map: null,
  markers: [],
};

const $ = sel => document.querySelector(sel);
const demoMode = !CONFIG.GOOGLE_API_KEY;

/* ============================================================
   開場流程
   ============================================================ */
$("#btnLocate").addEventListener("click", () => { enterApp(); locateThenSearch(); });
$("#btnPickArea").addEventListener("click", () => { enterApp(); openAreaModal(); });

function enterApp() {
  $("#splash").classList.add("hidden");
  $("#app").style.display = "flex";
  state.category = currentMealKey();   // 依現在時間自動推薦時段
  syncControls();
}

function locateThenSearch() {
  state.wholeArea = false;   // 目前位置一律步行模式
  setStatus(true, "定位中…");
  if (!navigator.geolocation || demoMode) {
    // demo：直接用預設中心（避免要求權限）
    if (demoMode) { state.center = jitter(CONFIG.DEFAULT_CENTER); search(); return; }
  }
  navigator.geolocation.getCurrentPosition(
    pos => { state.center = { lat: pos.coords.latitude, lng: pos.coords.longitude }; search(); },
    err => { toast("無法定位，改用預設中心"); state.center = { ...CONFIG.DEFAULT_CENTER }; search(); },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
  );
}

/* ============================================================
   控制列：範圍面板 / 半徑 / 排序 / 只看營業中
   ============================================================ */
function syncControls() {
  $("#radius").value = state.radius;
  $("#radiusVal").textContent = state.radius;
  $("#walkMin").textContent = Math.round(state.radius / CONFIG.WALK_SPEED_M_PER_MIN);
  $("#openOnly").checked = state.openOnly;
  document.querySelectorAll(".sort-chip").forEach(c =>
    c.setAttribute("aria-pressed", c.dataset.sort === state.sort));
  document.querySelectorAll(".mchip").forEach(c =>
    c.setAttribute("aria-pressed", c.dataset.cat === state.category));
}

$("#scopeBtn").addEventListener("click", () => $("#scopePanel").classList.toggle("hidden"));
$("#radius").addEventListener("input", e => {
  $("#radiusVal").textContent = e.target.value;
  $("#walkMin").textContent = Math.round(e.target.value / CONFIG.WALK_SPEED_M_PER_MIN);
});
$("#applyScope").addEventListener("click", () => {
  state.radius = +$("#radius").value;
  state.wholeArea = false;   // 手動設定步行半徑＝切回步行模式
  $("#scopeMode").textContent = state.usingArea ? "以選定地區為圓心" : "以目前位置為圓心";
  $("#scopePanel").classList.add("hidden");
  search();
});
$("#useArea").addEventListener("click", () => {
  $("#scopePanel").classList.add("hidden");
  openAreaModal();
});

document.querySelectorAll(".sort-chip").forEach(chip =>
  chip.addEventListener("click", () => {
    state.sort = chip.dataset.sort;
    syncControls();
    rankAndRender();
  }));

// 用餐時段 / 類型：改變類型需重新向 Places 搜尋
document.querySelectorAll(".mchip").forEach(chip =>
  chip.addEventListener("click", () => {
    state.category = chip.dataset.cat;
    syncControls();
    search();
  }));

$("#openOnly").addEventListener("change", e => {
  state.openOnly = e.target.checked;
  rankAndRender();
});

// 價位篩選（多選；空＝全部）
document.querySelectorAll(".pchip").forEach(chip =>
  chip.addEventListener("click", () => {
    const lvl = +chip.dataset.price;
    const on = chip.getAttribute("aria-pressed") === "true";
    chip.setAttribute("aria-pressed", String(!on));
    const idx = state.priceLevels.indexOf(lvl);
    if (idx >= 0) state.priceLevels.splice(idx, 1); else state.priceLevels.push(lvl);
    rankAndRender();
  }));

// 主題切換（淺色／暗色）— 記憶體狀態，不用 storage
const ICON_MOON = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';
const ICON_SUN  = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
$("#themeBtn").addEventListener("click", () => {
  const root = document.documentElement;
  const toLight = root.getAttribute("data-theme") !== "light";
  root.setAttribute("data-theme", toLight ? "light" : "dark");
  $("#themeIcon").innerHTML = toLight ? ICON_SUN : ICON_MOON;
  if (state.map) state.map.setOptions({ colorScheme: toLight ? "LIGHT" : "DARK" });
});

/* ============================================================
   Step 4 — 自然語言選地點：輸入地名/地標 → geocoding → 以該點搜尋
   ============================================================ */
// demo 內建查找（免金鑰）：台北 12 區 + 常見地標。真實模式則接 Google Geocoding。
const LOCAL_PLACES = {
  "中正區":{lat:25.0324,lng:121.5199}, "大同區":{lat:25.0658,lng:121.5130},
  "中山區":{lat:25.0640,lng:121.5330}, "松山區":{lat:25.0497,lng:121.5746},
  "大安區":{lat:25.0263,lng:121.5436}, "萬華區":{lat:25.0340,lng:121.4997},
  "信義區":{lat:25.0333,lng:121.5654}, "士林區":{lat:25.0928,lng:121.5240},
  "北投區":{lat:25.1320,lng:121.4986}, "內湖區":{lat:25.0697,lng:121.5890},
  "南港區":{lat:25.0554,lng:121.6066}, "文山區":{lat:24.9889,lng:121.5705},
  "台北車站":{lat:25.0478,lng:121.5170}, "台北101":{lat:25.0339,lng:121.5645},
  "西門町":{lat:25.0421,lng:121.5076}, "大安森林公園":{lat:25.0297,lng:121.5354},
  "師大夜市":{lat:25.0244,lng:121.5290}, "饒河夜市":{lat:25.0508,lng:121.5773},
  "永康街":{lat:25.0312,lng:121.5300}, "公館":{lat:25.0148,lng:121.5343},
};
const AREA_CHIPS = ["台北車站","信義區","大安區","西門町","台北101","師大夜市","公館"];

// 由「縣市 + 區域」下拉直接搜尋：走 Google 地理編碼（跳過簡寫字典，避免同名區如台北/台中大安區誤判）
async function pickCityArea(){
  const city = $("#citySel").value, area = $("#areaSel").value;
  if (!city || !area) return;
  const label = city + area;
  closeAreaModal();
  setStatus(true, "尋找地點…");
  try{
    let center;
    if (demoMode){
      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=zh-TW&q=${encodeURIComponent(label+" 台灣")}`);
      const j = await r.json(); if(!j[0]) throw new Error("找不到這個地區"); center = { lat:+j[0].lat, lng:+j[0].lon };
    } else {
      await loadGoogle();
      const { Geocoder } = await google.maps.importLibrary("geocoding");
      const res = await new Geocoder().geocode({ address: label, region:"tw", language:"zh-TW" });
      if (!res.results || !res.results.length) throw new Error("找不到這個地區");
      const g = res.results[0]; center = { lat:g.geometry.location.lat(), lng:g.geometry.location.lng() };
    }
    state.center = center; state.usingArea = true; state.areaName = label; state.wholeArea = true;
    $("#scopeLabel").textContent = label;
    $("#scopeMode").textContent = "整區範圍（不限步行距離）";
    if (state.map) state.map.setCenter(center);
    search();
  }catch(e){ setStatus(false); toast(e.message || "找不到地點"); }
}

/* ============ 用地圖選位置：拖曳地圖對準中心 → 反查地名 → 以該點搜尋 ============ */
let pickMap = null;
$("#btnMapPick").addEventListener("click", openPickMap);
$("#pickBack").addEventListener("click", () => $("#pickView").classList.add("hidden"));

async function openPickMap(){
  if (demoMode){ toast("地圖選位置需要 Google 金鑰"); return; }
  closeAreaModal();
  $("#pickView").classList.remove("hidden");
  try{
    await loadGoogle();
    const { Map } = await google.maps.importLibrary("maps");
    if (!pickMap){
      pickMap = new Map($("#pickMap"), {
        center: state.center, zoom: 15, disableDefaultUI: true,
        gestureHandling: "greedy", colorScheme: "DARK", mapId: CONFIG.MAP_ID,
      });
    } else { pickMap.setCenter(state.center); }
  }catch(e){ $("#pickView").classList.add("hidden"); toast("地圖載入失敗：" + e.message); }
}

async function confirmPick(){
  if (!pickMap) return;
  const c = pickMap.getCenter();
  const center = { lat: c.lat(), lng: c.lng() };
  $("#pickView").classList.add("hidden");
  setStatus(true, "尋找地點…");
  let label = "選定位置";
  try{
    const { Geocoder } = await google.maps.importLibrary("geocoding");
    const res = await new Geocoder().geocode({ location: center, language: "zh-TW" });
    if (res.results && res.results.length) label = shortAreaLabel(res.results) || label;
  }catch(_){}
  state.center = center; state.usingArea = true; state.areaName = label; state.wholeArea = false; // 地圖選點＝以該點步行搜尋
  $("#scopeLabel").textContent = label;
  $("#scopeMode").textContent = "以選定位置為圓心";
  search();
}

// 反查取出「縣市+區」短地名
function shortAreaLabel(results){
  for (const r of results){
    const comp = r.address_components || [];
    const get = t => { const x = comp.find(c => c.types.includes(t)); return x ? x.long_name : ""; };
    const city = get("administrative_area_level_1");
    const dist = get("administrative_area_level_2") || get("administrative_area_level_3") || get("sublocality_level_1");
    if (dist) return (city || "") + dist;
  }
  return "";
}

// 地名 → 座標
async function geocode(q){
  // 1) 內建字典（部分比對）
  for (const [name, c] of Object.entries(LOCAL_PLACES)){
    if (q.includes(name) || name.includes(q)) return { center:c, label:name };
  }
  // 2) 真實模式：Google Geocoding
  if (!demoMode){
    await loadGoogle();
    const { Geocoder } = await google.maps.importLibrary("geocoding");
    const res = await new Geocoder().geocode({ address:q, region:"tw", language:"zh-TW" });
    if (res.results && res.results.length){
      const g = res.results[0];
      return { center:{ lat:g.geometry.location.lat(), lng:g.geometry.location.lng() }, label:g.formatted_address };
    }
    throw new Error("找不到這個地點");
  }
  // 3) demo 後援：OpenStreetMap Nominatim（免金鑰）
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=zh-TW&q=${encodeURIComponent(q+" 台灣")}`);
    const j = await r.json();
    if (j[0]) return { center:{ lat:+j[0].lat, lng:+j[0].lon }, label:(j[0].display_name||q).split(",")[0] };
  }catch(_){}
  throw new Error("找不到這個地點，試試區名或地標");
}

async function submitArea(){
  const q = $("#areaInput").value.trim();
  if (!q) return;
  closeAreaModal();
  setStatus(true, "尋找地點…");
  try{
    const { center, label } = await geocode(q);
    state.center = center;
    state.usingArea = true;
    state.areaName = label;
    state.wholeArea = /區$/.test(label.trim());   // 結尾是「區」＝整區候選、忽略步行距離
    $("#scopeLabel").textContent = label;
    $("#scopeMode").textContent = state.wholeArea ? "整區範圍（不限步行距離）" : "以選定地區為圓心";
    if (state.map) state.map.setCenter(center);
    search();
  }catch(e){
    setStatus(false);
    toast(e.message || "找不到地點");
  }
}

  setStatus(true, demoMode ? "搜尋附近餐廳（demo 資料）…" : "搜尋附近餐廳…");
  try {

  }
}

/* ---- 真實 Places 搜尋（New） ---- */
let gmapsReady = null;
function loadGoogle() {
  if (gmapsReady) return gmapsReady;
  gmapsReady = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.GOOGLE_API_KEY}&v=weekly&libraries=places,marker`;
    s.async = true; s.onload = res; s.onerror = () => rej(new Error("Google Maps 載入失敗"));
    document.head.appendChild(s);
  });
  return gmapsReady;
}

async function placesSearch() {
  await loadGoogle();
  const { Place, SearchNearbyRankPreference } = await google.maps.importLibrary("places");
  const req = {
    fields: ["id","displayName","location","rating","userRatingCount",
             "priceLevel","regularOpeningHours","businessStatus","formattedAddress",
             "nationalPhoneNumber","editorialSummary","photos","reviewSummary"],
    locationRestriction: { center: state.center, radius: state.wholeArea ? CONFIG.DISTRICT_RADIUS_M : state.radius },
    includedPrimaryTypes: mealTypes(),
    maxResultCount: 20,
    rankPreference: SearchNearbyRankPreference.POPULARITY,
    language: "zh-TW", region: "tw",
  };
  const { places } = await Place.searchNearby(req);
  return (places || []).map(p => ({
    id: p.id,
    name: p.displayName,
    loc: { lat: p.location.lat(), lng: p.location.lng() },
    rating: p.rating || 0,
    count: p.userRatingCount || 0,
    priceLevel: priceToNum(p.priceLevel),
    openNow: isOpenNow(p.regularOpeningHours),
    address: p.formattedAddress || "",
    phone: p.nationalPhoneNumber || "",
    summary: p.editorialSummary || "",
    // Google 生成的評論摘要（Atmosphere SKU；zh-TW 有時回空，會自動退回規則摘要）
    reviewSummary: extractReviewSummary(p.reviewSummary),
    // 真實店家照片（Places photos）：縮圖小張、詳情大張，省流量
    photo:    p.photos?.[0]?.getURI({ maxWidth: 200, maxHeight: 200 }) || "",
    photoBig: p.photos?.[0]?.getURI({ maxWidth: 800, maxHeight: 480 }) || "",
    awards: [],          // Step 2 由評鑑名單比對填入
    aiReason: null,      // Step 3 由 Claude 填入
  }));
}
function priceToNum(pl){const map={
  FREE:0,INEXPENSIVE:1,MODERATE:2,EXPENSIVE:3,VERY_EXPENSIVE:4,
  PRICE_LEVEL_FREE:0,PRICE_LEVEL_INEXPENSIVE:1,PRICE_LEVEL_MODERATE:2,PRICE_LEVEL_EXPENSIVE:3,PRICE_LEVEL_VERY_EXPENSIVE:4
};return map[pl]||0;}
// 是否現在營業：新版 Places 的 regularOpeningHours.openNow 已不回傳，改用 periods 對現在時間判斷
function isOpenNow(oh){
  if (!oh || !oh.periods || !oh.periods.length) return null;   // 無資料＝未知
  const now = new Date();
  const mow = now.getDay()*1440 + now.getHours()*60 + now.getMinutes(); // 一週中的第幾分鐘
  for (const p of oh.periods){
    if (!p.open) continue;
    const s = p.open.day*1440 + (p.open.hour||0)*60 + (p.open.minute||0);
    if (!p.close) return true;                                  // 24 小時營業
    let e = p.close.day*1440 + (p.close.hour||0)*60 + (p.close.minute||0);
    if (e <= s) e += 10080;                                     // 跨夜
    if ((mow>=s && mow<e) || (mow+10080>=s && mow+10080<e)) return true;
  }
  return false;
}
// Google reviewSummary 結構不一（字串 / {text} / {text:{text}}），防禦式取出純文字
function extractReviewSummary(rs){
  if(!rs) return "";
  if(typeof rs==="string") return rs;
  if(typeof rs.text==="string") return rs.text;
  if(rs.text && typeof rs.text.text==="string") return rs.text.text;
  return "";
}

/* ============================================================
   排名：貝氏加權 + 加分 → 排序 → 取前五
   ============================================================ */
function computeM(items){
  if (!CONFIG.BAYES.DYNAMIC_M || !items.length) return CONFIG.BAYES.m;
  const rated = items.filter(i => i.count > 0);
  if (!rated.length) return CONFIG.BAYES.m;
  return rated.reduce((s,i)=>s+i.rating,0)/rated.length;
}

function bayes(item, m){
  const { C } = CONFIG.BAYES;
  return (C * m + item.count * item.rating) / (C + item.count);
}

function awardBonus(awards){
  let b = 0;
  for (const a of (awards||[])) {
    if (a.guide === "michelin") b += CONFIG.AWARD_BONUS.michelin[a.level] || 0;
    else if (a.guide === "bib") b += CONFIG.AWARD_BONUS.bib;
    else if (a.guide === "500plate") {
      const plates = a.plates != null ? a.plates : (parseInt(a.level) || 0);
      b += Math.min(plates * CONFIG.AWARD_BONUS.platePerUnit, CONFIG.AWARD_BONUS.plateCap);
    }
  }
  return b;
}

function distanceM(a, b){ // haversine
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function rankAndRender(){
  let items = state.raw.map(i => ({ ...i, dist: Math.round(distanceM(state.center, i.loc)) }));
  if (state.openOnly) items = items.filter(i => i.openNow === true);
  if (state.priceLevels.length) items = items.filter(i => state.priceLevels.includes(i.priceLevel));

  const m = computeM(items);
  items.forEach(i => {
    i.bayesScore = bayes(i, m);
    i.composite = i.bayesScore
      + awardBonus(i.awards)
      - (state.wholeArea ? 0 : (i.dist/100) * CONFIG.DISTANCE_PENALTY_PER_100M)
      + (i.openNow === true ? CONFIG.OPEN_BONUS : 0);
  });

  const cmp = {
    composite: (a,b) => b.composite - a.composite,
    distance:  (a,b) => a.dist - b.dist,
    rating:    (a,b) => b.rating - a.rating || b.count - a.count,
  }[state.sort];
  items.sort(cmp);

  state.ranked = items.slice(0, CONFIG.RESULT_COUNT);
  setStatus(false);
  applyAI();          // Step 3：填入上榜理由＋評論摘要（demo 同步 / live 非同步後再 render）
  renderList();
  if (state.map) renderMarkers();
}

/* ============================================================
   渲染清單 / 卡片
   ============================================================ */
function renderList(){
  const list = $("#list");
  renderOverview(state.ranked.length ? state.overview : "");
  if (!state.ranked.length){
    list.innerHTML = `<div class="detail-inner"><div class="ph">這個範圍內沒有符合條件的餐廳。<br>試試拉大搜尋半徑，或關閉「只看營業中」。</div></div>`;
    setSummary();
    return;
  }
  setSummary();
  list.innerHTML = state.ranked.map((r,i)=>cardHTML(r,i+1)).join("");
  // 綁定展開 / 導航
  list.querySelectorAll("[data-detail]").forEach(btn=>btn.addEventListener("click",()=>{
    const d = btn.closest(".card").querySelector(".detail");
    d.classList.toggle("open");
    btn.querySelector(".chev2").style.transform = d.classList.contains("open")?"rotate(180deg)":"";
  }));
  list.querySelectorAll("[data-nav]").forEach(btn=>btn.addEventListener("click",()=>{
    const {lat,lng,name} = btn.dataset;
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=&travelmode=walking&q=${encodeURIComponent(name)}`,"_blank");
  }));
}

function renderOverview(text){
  const el = $("#overview");
  if (!text){ el.classList.add("hidden"); el.innerHTML=""; return; }
  el.classList.remove("hidden");
  el.innerHTML = `<span class="lab">情境比較</span>${escapeHTML(text)}`;
}

function setSummary(){
  const where = state.usingArea ? state.areaName : "你附近";
  const scope = state.wholeArea ? "全區" : `步行 ${state.radius}m 內`;
  $("#status").innerHTML = `${where} · ${scope} · 前 ${state.ranked.length} 家`
    + (demoMode ? `<span class="demo-tag">DEMO 資料</span>` : "");
}

function cardHTML(r, rank){
  const price = r.priceLevel ? "$".repeat(r.priceLevel) : "";
  const walk = Math.max(1, Math.round(r.dist / CONFIG.WALK_SPEED_M_PER_MIN));
  const openTxt = r.openNow === true ? `<span class="open-now">營業中</span>`
                : r.openNow === false ? `<span class="closed">休息中</span>` : "";
  // 評鑑徽章：有資料就顯示，否則留 placeholder（Step 2）
  const badges = (r.awards && r.awards.length)
    ? r.awards.map(badgeHTML).join("")
    : "";  // 無評鑑就不顯示徽章（Step 2 已接真實名單）
  // AI 理由：有就顯示，否則 placeholder（Step 3）
  const ai = r.aiReason
    ? `<div class="ai-reason">${escapeHTML(r.aiReason)}</div>`
    : `<div class="ai-reason placeholder">AI 上榜理由 · Step 3 接入</div>`;
  const fallback = "this.style.visibility='hidden'";
  const thumb = r.photo
    ? `<img class="thumb" src="${escapeHTML(r.photo)}" alt="${escapeHTML(r.name)}" loading="lazy" onerror="${fallback}">`
    : "";
  const detailPhoto = (r.photoBig || r.photo)
    ? `<img class="photo" src="${escapeHTML(r.photoBig || r.photo)}" alt="${escapeHTML(r.name)}" loading="lazy" onerror="${fallback}">`
    : `<div class="ph">照片 — Step 3 / 真實資料接入</div>`;

  return `
  <div class="card">
    <div class="top">
      <div class="rank-badge">${rank}</div>
      <div class="head">
        <div class="name">${escapeHTML(r.name)}</div>
        <div class="meta">
          <span class="rating"><span class="star">★</span> ${r.rating.toFixed(1)}</span>
          <span class="count">(${r.count.toLocaleString()})</span>
          ${price?`<span class="price">${price}</span>`:""}
          ${openTxt}
          <span class="dist">步行 ${walk} 分 · ${r.dist} m</span>
        </div>
      </div>
      ${thumb}
    </div>
    <div class="badges">${badges}</div>
    ${ai}
    <div class="actions">
      <button class="nav" data-nav data-lat="${r.loc.lat}" data-lng="${r.loc.lng}" data-name="${escapeHTML(r.name)}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>
        導航
      </button>
      <button data-detail>詳情 <span class="chev2" style="display:inline-block;transition:transform var(--t)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
      </button>
    </div>
    <div class="detail">
      <div class="detail-inner">
        ${detailPhoto}
        ${r.reviewSummary
          ? `<div class="line"><span class="k">評論</span><span class="v">${escapeHTML(r.reviewSummary)}</span></div>`
          : `<div class="ph">評論摘要 — AI 生成</div>`}
        ${r.summary?`<div class="line"><span class="k">簡介</span><span class="v">${escapeHTML(r.summary)}</span></div>`:""}
        <div class="line"><span class="k">地址</span><span class="v">${escapeHTML(r.address||"—")}</span></div>
        <div class="line"><span class="k">電話</span><span class="v">${escapeHTML(r.phone||"—")}</span></div>
      </div>
    </div>
  </div>`;
}

function badgeHTML(a){
  if (a.guide==="michelin") return `<span class="badge michelin">米其林 ${a.level}<span class="yr">${a.year||""}</span></span>`;
  if (a.guide==="bib") return `<span class="badge bib">必比登<span class="yr">${a.year||""}</span></span>`;
  if (a.guide==="500plate") return `<span class="badge plate">500盤 ${a.level}<span class="yr">${a.year||""}</span></span>`;
  return "";
}

/* ============================================================
   地圖切換
   ============================================================ */
$("#fab").addEventListener("click", openMap);
$("#backToList").addEventListener("click", ()=>$("#mapView").classList.add("hidden"));

async function openMap(){
  $("#mapView").classList.remove("hidden");
  if (demoMode){
    $("#map").classList.add("hidden");
    const fb = $("#mapFallback"); fb.classList.remove("hidden");
    fb.innerHTML = "地圖需要 Google 金鑰。<br>填入 CONFIG.GOOGLE_API_KEY 後，這裡會顯示前五家的標記。";
    return;
  }
  try{
    await loadGoogle();
    if (!state.map){
      const { Map } = await google.maps.importLibrary("maps");
      state.map = new Map($("#map"), {
        center: state.center, zoom: 15, disableDefaultUI: true,
        gestureHandling: "greedy", colorScheme: "DARK",
        mapId: CONFIG.MAP_ID,   // 向量地圖 ID：進階標記需要，且支援深色樣式
      });
    } else {
      state.map.setCenter(state.center);
    }
    renderMarkers();
  }catch(e){
    $("#map").classList.add("hidden");
    $("#mapFallback").classList.remove("hidden");
    $("#mapFallback").textContent = "地圖載入失敗：" + e.message;
  }
}

async function renderMarkers(){
  if (!state.map) return;
  const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");
  state.markers.forEach(m=>m.map=null); state.markers=[];
  // 中心點
  state.ranked.forEach((r,i)=>{
    const pin = new PinElement({
      glyph: String(i+1), background: i===0? "#C8102E":"#1F1819",
      glyphColor: i===0? "#FFF6F3":"#F2ECE6", borderColor: i===0? "#C8102E":"#3A2F32", scale: 1.1,
    });
    const mk = new AdvancedMarkerElement({ map: state.map, position: r.loc, content: pin.element, title: r.name });
    state.markers.push(mk);
  });
}

/* ============================================================
   工具
   ============================================================ */
function setStatus(loading, msg){
  const el = $("#status");
  if (loading){ el.innerHTML = `<span class="spin"></span> ${msg||"載入中…"}`; }
}
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function jitter(c){return {lat:c.lat+(Math.random()-.5)*.004, lng:c.lng+(Math.random()-.5)*.004};}

/* ============================================================
   Step 2 — 評鑑模組：載入名單 + 模糊比對 + 500 盤彙總
   ============================================================ */
let AWARDS = null, awardsPromise = null;

// 內嵌備援：file:// 直接預覽時 fetch 會被 CORS 擋，改用這份（與 awards-taipei.json 同步維護）
const EMBEDDED_AWARDS = [
  { name:"海風生魚片丼",   address:"台北市中山區", awards:[{guide:"michelin",level:"二星",year:2025}] },
  { name:"五味爐 川菜小館", address:"台北市中山區", awards:[{guide:"michelin",level:"一星",year:2025}] },
  { name:"老巷牛肉麵",     address:"台北市中山區", awards:[{guide:"bib",year:2025},{guide:"500plate",year:2025,dishPlates:[3,2,1]}] },
  { name:"夜半食堂 居酒屋", address:"台北市中山區", awards:[{guide:"500plate",year:2025,plates:4}] },
  { name:"九層糕老店",     address:"台北市中山區", awards:[{guide:"bib",year:2024}] },
];

function ensureAwards(){
  if (AWARDS) return Promise.resolve(AWARDS);
  if (awardsPromise) return awardsPromise;
  awardsPromise = fetch(CONFIG.AWARDS_URL)
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(j => { AWARDS = j.restaurants || []; })
    .catch(() => { AWARDS = EMBEDDED_AWARDS; console.info("[評鑑] 改用內嵌備援名單（file:// 預覽屬正常）"); })
    .then(() => AWARDS);
  return awardsPromise;
}

// 店名正規化：全形→半形、去空白標點、去常見尾綴；用於模糊比對
function normName(s){
  return (s||"").toString()
    .replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/　/g," ")
    .replace(/\s+/g,"")
    .replace(/[()（）・·.,，、!！?？\-_/&]/g,"")
    .replace(/(總店|本店|本舖|旗艦店|[^]*?分店)$/,"")
    .toLowerCase();
}

// 比對：完全相等→high；包含關係→medium（地址可升級為 high）
function matchAward(rest, list){
  const rn = normName(rest.name);
  if (!rn) return { entry:null, conf:"none" };
  let best=null, conf="none";
  for (const e of list){
    const en = normName(e.name);
    if (!en) continue;
    if (en === rn){ best=e; conf="high"; break; }
    if (en.length>=3 && (rn.includes(en)||en.includes(rn))){ best=e; conf="medium"; }
  }
  if (best && conf==="medium" && best.address && rest.address){
    const a1=best.address.replace(/\s/g,""), a2=rest.address.replace(/\s/g,"");
    if (a1 && a2 && (a2.includes(a1.slice(0,6))||a1.includes(a2.slice(0,6)))) conf="high";
  }
  return { entry:best, conf };
}

// 彙總 500 盤（dishPlates 各菜盤數 → 餐廳層級總盤數）並標準化顯示
function normalizeAwards(awards){
  return (awards||[]).map(a=>{
    if (a.guide==="500plate"){
      const plates = a.dishPlates ? a.dishPlates.reduce((s,x)=>s+x,0) : (a.plates||0);
      return { ...a, plates, level:`${plates}盤` };
    }
    return a;
  });
}

// 套用到搜尋結果：高信心自動標；低信心列入 console 待人工覆核（不默默標錯）
function applyAwards(items){
  const review = [];
  items.forEach(r=>{
    r.awards = r.awards || [];
    if (!AWARDS || !AWARDS.length) return;
    const { entry, conf } = matchAward(r, AWARDS);
    // 高信心（完全同名或地址相符）自動標。中信心（店名包含關係，如「鼎泰豐 101店」含「鼎泰豐」）
    // 也自動標，但記入 console 供人工覆核——真實 Google 店名常帶分店/地區後綴，純高信心會漏標。
    if (entry && (conf==="high" || conf==="medium")) {
      r.awards = normalizeAwards(entry.awards);
      if (conf==="medium") review.push({ store:r.name, matched:entry.name });
    }
  });
  if (review.length) console.info("[評鑑比對] 中信心自動標記（建議人工確認是否為同一家）：", review);
}

/* ============================================================
   Step 3 — AI 解讀：一次處理五家，填上榜理由＋評論摘要
   AI 只解讀真實資料，不碰計算與定位、不杜撰
   ============================================================ */
function applyAI(){
  if (CONFIG.AI.MODE==="live" && CONFIG.AI.API_KEY){
    state.ranked.forEach(r=>{ r.aiReason=r.aiReason||"分析中…"; });
    aiLive(state.ranked);   // 非同步，完成後自行 renderList
  } else {
    state.ranked.forEach(r=>{ const a=demoReason(r); r.aiReason=a.reason; if(!r.reviewSummary) r.reviewSummary=a.summary; });
    state.overview = buildOverview(state.ranked);   // Step 4：情境比較
  }
}

// 情境比較（demo）：由前五的真實屬性組出一句整體短評
function buildOverview(items){
  if (!items || items.length < 2) return "";
  const top = items[0];
  const nearest = [...items].sort((a,b)=>a.dist-b.dist)[0];
  const starred = items.find(r=>(r.awards||[]).some(a=>a.guide==="michelin"));
  const cheap = [...items].filter(r=>r.priceLevel===1).sort((a,b)=>b.rating-a.rating)[0];
  const parts = [`綜合最穩 → ${top.name}`];
  if (nearest && nearest!==top) parts.push(`最近 → ${nearest.name}（步行 ${Math.max(1,Math.round(nearest.dist/CONFIG.WALK_SPEED_M_PER_MIN))} 分）`);
  if (starred) parts.push(`想吃米其林 → ${starred.name}`);
  else if (cheap) parts.push(`想平價 → ${cheap.name}`);
  return parts.join("；") + "。";
}

// 規則文案（demo）：全部取自真實欄位，不杜撰
function topAwardText(awards){
  const m=(awards||[]).find(a=>a.guide==="michelin"); if(m) return `米其林${m.level}`;
  const b=(awards||[]).find(a=>a.guide==="bib");      if(b) return "必比登推介";
  const p=(awards||[]).find(a=>a.guide==="500plate"); if(p) return `500盤 ${p.level}`;
  return "";
}
function demoReason(r){
  const walk = Math.max(1, Math.round(r.dist / CONFIG.WALK_SPEED_M_PER_MIN));
  const award = topAwardText(r.awards);
  const bits = [];
  if (award) bits.push(award + "肯定");
  bits.push(r.count>=1000
    ? `${r.count.toLocaleString()} 則評論仍守住 ${r.rating.toFixed(1)} 分`
    : `${r.rating.toFixed(1)} 分（${r.count.toLocaleString()} 則）`);
  bits.push(`步行 ${walk} 分可達`);
  const priceTxt = ["","平價","中價位","價位偏高","高價位"][r.priceLevel] || "";
  return {
    reason: bits.slice(0,3).join("，") + "。",
    summary: `${priceTxt?priceTxt+"，":""}口碑由 ${r.count.toLocaleString()} 則評論長期累積，評分穩定在 ${r.rating.toFixed(1)}。`,
  };
}

// 真實呼叫 Claude（一次五家）。上線建議改走後端代理，勿在前端帶金鑰。
async function aiLive(items){
  try{
    const payload = items.map((r,i)=>({
      rank:i+1, name:r.name, rating:r.rating, count:r.count,
      priceLevel:r.priceLevel, openNow:r.openNow,
      walkMin: Math.round(r.dist/CONFIG.WALK_SPEED_M_PER_MIN),
      awards: r.awards, editorialSummary: r.summary,
    }));
    const system = "你是在地步行覓食嚮導。只依據使用者提供的每家餐廳資料，產生繁體中文短評，"
      + "嚴禁杜撰未提供的事實。回傳純 JSON 物件 {overview, items}："
      + "items 為陣列，長度與輸入相同，每筆含 reason（為何排此名，≤30字）與 summary（評論特徵，≤30字）；"
      + "overview 為一句情境比較（例：想快選 A、想坐久選 B，≤40字）。只輸出 JSON。";
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":CONFIG.AI.API_KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({
        model: CONFIG.AI.MODEL, max_tokens: 1024, system,
        messages:[{ role:"user", content: JSON.stringify(payload) }],
      }),
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const text = data.content?.[0]?.text || "{}";
    const obj = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
    const arr = obj.items || [];
    items.forEach((r,i)=>{ r.aiReason=arr[i]?.reason||""; r.reviewSummary=arr[i]?.summary||""; });
    state.overview = obj.overview || buildOverview(items);
  }catch(e){
    console.warn("[AI] live 失敗，改用 demo 文案：", e.message);
    items.forEach(r=>{ const a=demoReason(r); r.aiReason=a.reason; r.reviewSummary=a.summary; });
    state.overview = buildOverview(items);
  }
  renderList();
}
