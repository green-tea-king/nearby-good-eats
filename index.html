function handleDetailPhotoError(img){
  if (!img) return;
  img.classList.add("is-broken");
  img.removeAttribute("src");
  img.removeAttribute("data-lazy-src");
  const card = img.closest(".card");
  const photos = img.closest(".photos");
  const allBroken = photos && [...photos.querySelectorAll("img")].every(x => x.classList.contains("is-broken"));
  if (card && allBroken) ensureDetailPhotos(card, { force:true, reason:"broken" });
}
function bindPhotoPreview(img){
  if (!img || img.dataset.photoBound === "1") return;
  img.dataset.photoBound = "1";
  img.addEventListener("click", () => {
    if (img.classList.contains("is-broken")) return;
    openPhotoLightbox(img.dataset.photoPreview || img.currentSrc || img.src, img.dataset.caption || img.alt || "");
  });
}
async function ensureDetailPhotos(card, { force=false, reason="missing" }={}){
  if (!card) return;
  if (!force && card.dataset.photoFallbackChecked === "1") return;
  card.dataset.photoFallbackChecked = "1";
  const name = card.dataset.name || "這家店";
  setGuideWorking(reason === "broken"
    ? `照片載入失敗，正在用「${name}」店名與地址重新補查可用照片。`
    : `Google 詳細資料沒有提供「${name}」照片，正在用店名與地址補查。`);
  const photos = await fetchPhotoFallbackForCard(card, { force }).catch(() => []);
  if (!photos.length) {
    setGuideEmpty(`Google 目前沒有可用照片，先保留「${name}」的文字與路線資訊。`);
    return;
  }
  const inner = card.querySelector(".detail-inner");
  if (!inner) return;
  const existing = inner.querySelector(".photos");
  if (existing && !force) return;
  if (existing) existing.remove();
  inner.insertAdjacentHTML("afterbegin", photoStripHTML(photos, name));
  inner.querySelectorAll("[data-photo-preview]").forEach(bindPhotoPreview);
  loadDetailPhotos(card);
  setGuideReady(`已補到「${name}」照片；點小圖可以放大查看。`);
}
async function fetchPhotoFallbackForCard(card, { force=false }={}){
  if (!hasGoogleApiKey) return [];
  const placeId = card.dataset.placeId || "";
  const name = card.dataset.name || "";
  const address = card.dataset.address || "";
  if (!placeId || !name) return [];
  const key = apiCacheKey("photoFallback", { placeId, name, address });
  const cached = readApiCache(key);
  if (Array.isArray(cached) && cached.length && !force) return cached;
  if (Array.isArray(cached)){
    memoryCache.delete(key);
    try{ localStorage.removeItem(key); }catch(_){}
  }
  await loadGoogle();
  const { Place } = await google.maps.importLibrary("places");
  const parsed = cityAreaFromAddress(address);
  const queries = [
    [name, address].filter(Boolean).join(" "),
    [name, parsed.city, parsed.area].filter(Boolean).join(" "),
  ].filter((q, i, arr) => q && arr.indexOf(q) === i);
  for (const textQuery of queries){
    const req = {
      textQuery,
      fields:["id","displayName","formattedAddress","location","photos"],
      maxResultCount:5,
      language:"zh-TW",
      region:"tw",
    };
    const lat = Number(card.dataset.lat), lng = Number(card.dataset.lng);
    if (Number.isFinite(lat) && Number.isFinite(lng)) req.locationBias = { center:{ lat, lng }, radius:800 };
    const res = await Place.searchByText(req);
    const photos = choosePhotoFallback(placeId, name, address, res.places || []);
    if (photos.length) return writeApiCache(key, photos, CONFIG.CACHE_TTL_MS.details);
  }
  return [];
}
function choosePhotoFallback(placeId, name, address, places){
  const restCity = cityAreaFromAddress(address).city;
  const rn = normName(name);
  for (const p of places){
    const pn = normName(extractText(p.displayName) || "");
    const city = cityAreaFromAddress(p.formattedAddress || "").city;
    const samePlace = p.id && p.id === placeId;
    const sameName = rn && pn && (rn.includes(pn) || pn.includes(rn));
    const sameCity = !restCity || !city || normalizeTaiwanCity(restCity) === normalizeTaiwanCity(city);
    if ((samePlace || (sameName && sameCity)) && p.photos?.length){
      return p.photos.slice(0,3).map(ph => ph.getURI({ maxWidth:560, maxHeight:420 }));
    }
  }
  return [];
}
function observeLazyPhotos(root){
  const imgs = [...root.querySelectorAll("img[data-lazy-src]")];
  if (!imgs.length) return;
  if (!("IntersectionObserver" in window)){
    imgs.forEach(img => {
      img.src = img.dataset.lazySrc;
      img.removeAttribute("data-lazy-src");
    });
    return;
  }
  if (!cardPhotoObserver){
    cardPhotoObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        img.src = img.dataset.lazySrc;
        img.removeAttribute("data-lazy-src");
        cardPhotoObserver.unobserve(img);
      });
    }, { root:null, rootMargin:"160px 0px", threshold:0.01 });
  }
  imgs.forEach(img => cardPhotoObserver.observe(img));
}

async function copyShareUrl(url){
  try{
    await navigator.clipboard.writeText(url);
    toast("已複製分享連結，可貼給朋友");
  }catch(_){
    const ta = document.createElement("textarea");
    ta.value = url;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "0";
    document.body.appendChild(ta);
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    const ok = document.execCommand?.("copy");
    ta.remove();
    toast(ok ? "已複製分享連結，可貼給朋友" : "無法自動複製，請長按連結複製");
  }
}

    + `<input id="rkKeyword" class="keyword-input" type="search" inputmode="search" enterkeyhint="search" maxlength="24" placeholder="例如：麵線、滷肉飯" value="${escapeHTML(f.keyword || "")}">`
    + `</div></div>`;
  html += RANK_FILTERS.map(g =>
    `<div class="fg${g.key==="travel" ? " fg-travel" : ""}"><span class="fg-lab">${g.label}</span><div class="fg-chips">`
    + g.opts.map(o => `<button class="fchip${f[g.key]===o.label?" on":""}" data-fkey="${g.key}" data-fval="${o.label}">${o.label}</button>`).join("")
    + (g.key==="travel"
      ? `<button class="flocate" id="rkTravelLocate" type="button" aria-label="定位交通起點" title="定位交通起點"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></button>${rankOriginLabel ? `<span class="origin-hint">定位：${escapeHTML(rankOriginLabel)}</span>` : ""}`
      : "")
    + `</div></div>`
  ).join("");
  const active = Object.entries(f).some(([k,v]) => v && !(k==="open" && v===RANK_DEFAULT_OPEN) && !(k==="travel" && v===RANK_DEFAULT_TRAVEL));
  html += `<div class="mode-hint"><b>目前模式</b>：${escapeHTML(rankModeHintText(f))}</div>`;
  html += `<div class="filter-precision"><b>判斷來源</b>：${escapeHTML(rankFilterPrecisionText(f))}</div>`;
  html += `<div class="filter-actions"><button class="fclear${active?"":" hidden"}" id="rkClear" type="button">清除</button><button id="rkKeywordApply" class="keyword-apply" type="button">套用</button></div>`;
  bar.innerHTML = html;

  bar.querySelectorAll(".fchip").forEach(b => b.addEventListener("click", () => {
    const f = editableRankFilter();
    const k=b.dataset.fkey, v=b.dataset.fval;
    if (k === "meal") rankAutoMeal = false;
    if (k === "travel"){
      f.travel = f.travel === v ? RANK_DEFAULT_TRAVEL : v;
      if (f.travel) clearRankLocationFilter({ notify:true, target:f });
      else rankOriginLabel = "";
    } else {
      f[k] = k === "open" ? v : (f[k]===v ? null : v);
    }
    markRankFilterInteraction(1200);
    buildRankFilterBar();
  }));
  const syncKeywordDraft = () => {
    editableRankFilter().keyword = ($("#rkKeyword")?.value || "").trim();
  };
  const applyFilters = () => {
    syncKeywordDraft();
    const changed = commitRankFilterDraft();
    rankKeywordPools = {};
    rankNearbyPools = {};
    trackUsage("filter_apply", { keyword:rankFilter.keyword || "", meal:rankFilter.meal || "", travel:rankFilter.travel || "", open:rankFilter.open || "", city:rankFilter.city || "", area:rankFilter.area || "", village:rankFilter.village || "" });
    closeRankFilters();
    safeRenderLeaderboard();
    if (changed) toast("已套用濾網");
  };
  $("#rkKeywordApply")?.addEventListener("click", applyFilters);
  const keywordInput = $("#rkKeyword");
  ["focus","input","compositionstart","compositionupdate","touchstart","pointerdown"].forEach(type => {
    keywordInput?.addEventListener(type, () => markRankFilterInteraction(2400), { passive:true });
  });
  keywordInput?.addEventListener("input", syncKeywordDraft);
  keywordInput?.addEventListener("blur", () => markRankFilterInteraction(500));
  keywordInput?.addEventListener("keydown", e => {
    markRankFilterInteraction(2400);
    if (e.key === "Enter"){
      e.preventDefault();
      applyFilters();
    }
  });
  fillRkArea();
  fillRkVillage();
  $("#rkCity").addEventListener("change", e => { const f = editableRankFilter(); f.city=e.target.value; f.area=""; f.village=""; if (hasRankLocationFilter(f)) clearRankTravelFilter({ notify:true, target:f }); markRankFilterInteraction(); buildRankFilterBar(); });
  $("#rkArea").addEventListener("change", e => { const f = editableRankFilter(); f.area=e.target.value; f.village=""; if (hasRankLocationFilter(f)) clearRankTravelFilter({ notify:true, target:f }); markRankFilterInteraction(); fillRkVillage(); buildRankFilterBar(); });
  $("#rkVillage").addEventListener("change", e => { const f = editableRankFilter(); f.village=e.target.value; if (hasRankLocationFilter(f)) clearRankTravelFilter({ notify:true, target:f }); markRankFilterInteraction(); buildRankFilterBar(); });
  $("#rkTravelLocate")?.addEventListener("click", e => locateRankOrigin(e.currentTarget));
  const clr = $("#rkClear"); if (clr) clr.addEventListener("click", () => {
    const f = editableRankFilter();
    Object.keys(f).forEach(k => f[k] = k==="open" ? RANK_DEFAULT_OPEN : (k==="travel" ? RANK_DEFAULT_TRAVEL : ((k==="city"||k==="area"||k==="village") ? "" : null)));
    f.keyword = "";
    rankAutoMeal = false;
    rankOriginLabel = "";
    markRankFilterInteraction();
    buildRankFilterBar();
  });
}
function fillRkArea(){
  const as = $("#rkArea"); if (!as) return;
  const f = editableRankFilter();
  const list = TW_AREAS[f.city] || [];
  as.innerHTML = `<option value="">區域</option>` + list.map(a => `<option value="${a}"${f.area===a?" selected":""}>${a}</option>`).join("");
  as.disabled = !f.city;
}
function fillRkVillage(){
  const vs = $("#rkVillage"); if (!vs) return;
  const f = editableRankFilter();
  if (!f.city || !f.area){
    vs.innerHTML = `<option value="">里</option>`;
    vs.disabled = true;
    return;
  }
  if (!villageData){
    vs.innerHTML = `<option value="">載入里</option>`;
    vs.disabled = true;
    loadVillageData().then(() => {
      const fresh = $("#rkVillage");
      const f = editableRankFilter();
      if (fresh && f.city && f.area) fillRkVillage();
    });
    return;
  }
  const list = villagesFor(f.city, f.area);
  if (f.village && !list.includes(f.village)) f.village = "";
  vs.innerHTML = `<option value="">里</option>` + list.map(v => `<option value="${v}"${f.village===v?" selected":""}>${v}</option>`).join("");
  vs.disabled = !list.length;
}

function enterApp() {
  $("#splash")?.classList.add("hidden");
  $("#app").style.display = "flex";
  state.category = currentMealKey();   // 依現在時間自動推薦時段
  syncControls();
}

function locateThenSearch() {
  state.wholeArea = false;   // 目前位置一律步行模式
  setStatus(true, "定位中…");
  notifyLocationPrivacyOnce();
  if (!navigator.geolocation) {
    toast("無法使用定位，改用預設中心搜尋真實資料");
    state.center = { ...CONFIG.DEFAULT_CENTER };
    search();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => { state.center = { lat: pos.coords.latitude, lng: pos.coords.longitude }; search(); },
    err => { toast("無法定位，改用預設中心搜尋真實資料"); state.center = { ...CONFIG.DEFAULT_CENTER }; search(); },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
  );
}

// 由「縣市 + 區域」下拉直接搜尋：走 Google 地理編碼（跳過簡寫字典，避免同名區如台北/台中大安區誤判）
async function pickCityArea(){
  const city = $("#citySel").value, area = $("#areaSel").value;
  if (!city || !area) return;
  const label = city + area;
  closeAreaModal();
  setStatus(true, "尋找地點…");
  try{
    let center;
    await loadGoogle();
    const { Geocoder } = await google.maps.importLibrary("geocoding");
    const res = await new Geocoder().geocode({ address: label, region:"tw", language:"zh-TW" });
    if (!res.results || !res.results.length) throw new Error("找不到這個地區");
    const g = res.results[0]; center = { lat:g.geometry.location.lat(), lng:g.geometry.location.lng() };
    state.center = center; state.usingArea = true; state.areaName = label; state.wholeArea = true;
    $("#scopeLabel").textContent = label;
    $("#scopeMode").textContent = "整區範圍（不限步行距離）";
    if (state.map) state.map.setCenter(center);
    search();
  }catch(e){ setStatus(false); toast(e.message || "找不到地點"); }
}

    as.innerHTML = '<option value="">區域</option>' + list.map(a=>`<option value="${a}">${a}</option>`).join("");
  });

})();

  setTimeout(()=>$("#areaInput").focus(), 50);
}
function closeAreaModal(){
  $("#areaModal").classList.add("hidden");

let autocompleteSessionToken = null;
let autocompleteTimer = null;
function clearAreaSuggestions(){
  const box = $("#areaSuggest");
  if (!box) return;
  box.classList.add("hidden");
  box.innerHTML = "";
}
async function showAreaSuggestions(q){
  const box = $("#areaSuggest");
  if (!box || !q || q.length < 2 || !hasGoogleApiKey){ clearAreaSuggestions(); return; }
  try{
    await loadGoogle();
    const { AutocompleteSessionToken, AutocompleteSuggestion } = await google.maps.importLibrary("places");
    if (!autocompleteSessionToken) autocompleteSessionToken = new AutocompleteSessionToken();
    const request = {
      input: q,
      sessionToken: autocompleteSessionToken,
      origin: state.center,
      language: "zh-TW",
      region: "tw",
    };
    const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions(request);
    const items = (suggestions || []).filter(s => s.placePrediction).slice(0, 5);
    if (!items.length){ clearAreaSuggestions(); return; }
    box.innerHTML = items.map((s, i) => {
      const p = s.placePrediction;
      const main = toTW(p.text?.toString?.() || "");
      const secondary = toTW(p.secondaryText?.toString?.() || "");
      return `<button type="button" class="autocomplete-item" data-suggest="${i}">
        ${escapeHTML(main)}${secondary?`<small>${escapeHTML(secondary)}</small>`:""}
      </button>`;
    }).join("");
    box.classList.remove("hidden");
    box.querySelectorAll("[data-suggest]").forEach(btn => {
      btn.addEventListener("click", () => selectAreaSuggestion(items[Number(btn.dataset.suggest)]));
    });
  }catch(e){

    const city = get("administrative_area_level_1");

    if (dist) return (city || "") + dist;

function priceToNum(pl){const map={
  FREE:0,INEXPENSIVE:1,MODERATE:2,EXPENSIVE:3,VERY_EXPENSIVE:4,
  PRICE_LEVEL_FREE:0,PRICE_LEVEL_INEXPENSIVE:1,PRICE_LEVEL_MODERATE:2,PRICE_LEVEL_EXPENSIVE:3,PRICE_LEVEL_VERY_EXPENSIVE:4
};return map[pl]||0;}
// 是否現在營業：新版 Places 的 regularOpeningHours.openNow 已不回傳，改用 periods 對現在時間判斷
function isOpenNow(oh){
  if (!oh || !oh.periods || !oh.periods.length) return null;   // 無資料＝未知
  const now = new Date();
  const mow = now.getDay()*1440 + now.getHours()*60 + now.getMinutes(); // 一週中的第幾分鐘
  for (const p of oh.periods){
    if (!p.open) continue;
    const s = p.open.day*1440 + (p.open.hour||0)*60 + (p.open.minute||0);
    if (!p.close) return true;                                  // 24 小時營業
    let e = p.close.day*1440 + (p.close.hour||0)*60 + (p.close.minute||0);
    if (e <= s) e += 10080;                                     // 跨夜
    if ((mow>=s && mow<e) || (mow+10080>=s && mow+10080<e)) return true;
  }
  return false;
}

// 簡體→繁體（台灣用字）。OpenCC 載入後建立轉換器；未就緒時原樣回傳。
// Google 的 zh-TW 資料多半已是繁體，只偶有簡體字外洩（如 信义区）。整串丟 OpenCC 反而會把
// 「同時也是合法繁體字」的字誤改（台→臺、里→裏、郁→鬱、松→鬆…）。因此逐字轉換，並保護這些
// 一簡對多繁、且自身即為合法繁體的歧義字，讓 Google 既有的正確繁體用字原樣保留。
let __twConv = null;
function __initConv(){ if(!__twConv){ try{ if(window.OpenCC) __twConv = OpenCC.Converter({from:"cn",to:"t"}); }catch(_){ } } return __twConv; }
__initConv();
const __TW_PROTECT = new Set("台后里面松郁余谷系范干表制准板几卜斗才困占卷升游折念划凶沈丑向咸夸著只云");
function toTW(s){
  if(!s) return s;
  const conv = __initConv();
  if(!conv) return s;
  let out="";
  for(const ch of s){
    if(ch.charCodeAt(0) < 0x4e00 || __TW_PROTECT.has(ch)){ out += ch; continue; }   // 非漢字或歧義字：原樣
    try{ out += conv(ch); }catch(_){ out += ch; }
  }
  return out;
}

   排名：貝氏加權 + 加分 → 排序 → 取前三

function computeM(items){
  if (!CONFIG.BAYES.DYNAMIC_M || !items.length) return CONFIG.BAYES.m;
  const rated = items.filter(i => i.count > 0);
  if (!rated.length) return CONFIG.BAYES.m;
  return rated.reduce((s,i)=>s+i.rating,0)/rated.length;
}

function bayes(item, m){
  const { C } = CONFIG.BAYES;
  return (C * m + item.count * item.rating) / (C + item.count);
}

function reviewCountBonus(count){
  const cfg = CONFIG.REVIEW_COUNT_BONUS;
  return Math.min(Math.log10((count || 0) + 1) * cfg.SCALE, cfg.CAP);
}

function awardBonus(awards){
  let michelin = 0;
  let fiftyBest = 0;
  let bib = 0;
  let plate = 0;
  let selected = 0;
  for (const a of (awards||[])) {
    if (a.guide === "michelin") {
      michelin = Math.max(michelin, CONFIG.AWARD_BONUS.michelin[a.level] || 0);
    } else if (a.guide === "michelin_selected") {
      selected = CONFIG.AWARD_BONUS.michelinSelected;
    } else if (a.guide === "50best") {
      fiftyBest = CONFIG.AWARD_BONUS.fiftyBest;
    } else if (a.guide === "bib") {
      bib = CONFIG.AWARD_BONUS.bib;
    } else if (a.guide === "500plate" || a.guide === "500bowl" || a.guide === "500sweet") {
      const units = Number(a.plates ?? a.bowls ?? a.sweets ?? String(a.level || "").match(/\d+/)?.[0] ?? 1) || 1;
      plate = Math.max(plate, Math.min(units * CONFIG.AWARD_BONUS.platePerUnit, CONFIG.AWARD_BONUS.plateCap));
    }
  }
  return Math.min(michelin + fiftyBest + bib + plate + selected, CONFIG.AWARD_BONUS.totalCap);
}

function socialSignalBonus(signals){
  const cfg = CONFIG.SOCIAL_SIGNAL_BONUS;
  let youtube = 0;
  let social = 0;
  let platform = 0;
  let media = 0;
  for (const s of (signals || [])){
    const score = Math.max(0, Math.min(100, Number(s.score) || 0)) / 100;
    const conf = cfg.confidence[String(s.confidence || "medium").toLowerCase()] ?? cfg.confidence.medium;
    const weighted = score * conf;
    if (s.type === "youtubeBuzz") youtube = Math.max(youtube, weighted * cfg.youtubeCap);
    else if (s.type === "socialBuzz") social = Math.max(social, weighted * cfg.socialCap);
    else if (s.type === "platformRating" || s.type === "platformCertification") platform = Math.max(platform, weighted * cfg.platformCap);
    else if (s.type === "mediaMention") media = Math.max(media, weighted * cfg.mediaCap);
  }
  return Math.min(youtube + social + platform + media, cfg.totalCap);
}

function primarySocialSignal(signals){
  const visibleTypes = new Set(["youtubeBuzz", "socialBuzz", "mediaMention", "platformRating", "platformCertification"]);
  return (signals || [])
    .filter(s => s && visibleTypes.has(s.type))
    .sort((a,b) => (Number(b.score)||0) - (Number(a.score)||0))[0] || null;
}

function distanceM(a, b){ // haversine
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

  items.forEach((item, i) => {
    if (!item || item.condition && item.condition !== "ROUTE_EXISTS") return;
    const r = targets[i]; if (!r) return;
    const dur = item.durationMillis ?? (item.duration?.value ? item.duration.value * 1000 : null);
    const dist = item.distanceMeters ?? item.distance?.value ?? null;
    if (dur) r[`${prefix}Min`] = Math.max(1, Math.round(dur / 60000));
    if (dist) r[`${prefix}Meters`] = Math.round(dist);
  });
}
async function routeMatrixItems(targets, travelMode){
  const [{ RouteMatrix }, { UnitSystem }] = await Promise.all([
    google.maps.importLibrary("routes"),
    google.maps.importLibrary("core"),
  ]);
  const request = {
    origins: [state.center],
    destinations: targets.map(r => r._place || r.loc),
    travelMode,
    units: UnitSystem.METRIC,
    fields: ["distanceMeters","durationMillis","condition"],
  };
  const response = await Promise.race([
    RouteMatrix.computeRouteMatrix(request),
    timeoutAfter(CONFIG.ROUTE_TIMEOUT_MS, "Routes API 逾時"),
  ]);
  return readMatrixItems(response);
}
function distanceMatrixItems(targets, travelMode){
  return new Promise((resolve, reject) => {
    const svc = new google.maps.DistanceMatrixService();
    svc.getDistanceMatrix({
      origins: [state.center],
      destinations: targets.map(r => r.loc),
      travelMode,
      unitSystem: google.maps.UnitSystem.METRIC,
    }, (res, status) => {
      if (status !== "OK") { reject(new Error(status)); return; }
      const elements = res?.rows?.[0]?.elements || [];
      resolve(elements.map(e => ({
        condition: e.status === "OK" ? "ROUTE_EXISTS" : e.status,
        distanceMeters: e.distance?.value,
        durationMillis: e.duration?.value ? e.duration.value * 1000 : null,
      })));
    });
  });
}
async function enrichRoutes(){
  const token = ++routeRenderToken;
  const targets = state.ranked.filter(r => r.loc && r.dist != null);
  if (!targets.length || !hasDataApi) return;
  try{
    const travel = activeRankTravel();
    const spec = routeModeSpec(travel);
    const items = await routeItemsCached(targets, travel);
    if (token !== routeRenderToken) return;
    applyRouteItems(items, targets, spec.prefix);
    trackUsage("route_result", { targetCount:targets.length, mode:spec.apiMode, itemCount:items.length });
    renderList();
  }catch(e){
    console.warn("[路線] Google 路線時間取得失敗，保留直線距離估算：", e.message);
  }
}

function rankAndRender(){
  let items = state.raw.map(i => ({ ...i, dist: Math.round(distanceM(state.center, i.loc)) }));
  if (state.openOnly) items = items.filter(i => i.openNow === true);
  if (state.priceLevels.length) items = items.filter(i => state.priceLevels.includes(i.priceLevel));

  const m = computeM(items);
  items.forEach(i => {
    i.bayesScore = bayes(i, m);
    i.reviewCountBonus = reviewCountBonus(i.count);
    i.socialBonus = socialSignalBonus(i.externalSignals);
    i.composite = i.bayesScore
      + i.reviewCountBonus
      + awardBonus(i.awards)
      + i.socialBonus
      - (state.wholeArea ? 0 : (i.dist/100) * CONFIG.DISTANCE_PENALTY_PER_100M)
      + (i.openNow === true ? CONFIG.OPEN_BONUS : 0)
      + mealMatchBonus(i);
  });

  const cmp = {
    composite: (a,b) => b.composite - a.composite,
    distance:  (a,b) => a.dist - b.dist,
    rating:    (a,b) => b.rating - a.rating || b.count - a.count,
  }[state.sort];
  items.sort(cmp);

  state.ranked = items.slice(0, CONFIG.RESULT_COUNT);
  setStatus(false);
  applyAI();
  renderList();
  if (state.map) renderMarkers();
  enrichTop();        // 只對前 3 家補抓 Google 簡介/評論摘要（省 Atmosphere 費用），完成後再 render
  enrichRoutes();     // 以 Google 路線服務補上實際步行/開車時間，完成後再 render
}

// 排名後只對前 3 家補抓 Atmosphere 欄位（reviewSummary/editorialSummary）
async function enrichTop(){
  const list = state.ranked.filter(r => r._place);
  if (!list.length) return;
  try{
    await Promise.all(list.map(async r=>{
      // 只抓摘要欄位（已不抓個別 reviews，省 Atmosphere 費用、且詳情只顯示融合摘要）
      await r._place.fetchFields({ fields:["reviewSummary","editorialSummary","generativeSummary"] });
      const rs = toTW(extractReviewSummary(r._place.reviewSummary));
      const ed = toTW(extractEditorial(r._place.editorialSummary));
      const gs = toTW(extractGenerativeSummary(r._place.generativeSummary));
      if (rs) r.reviewSummary = rs;
      if (ed) r.summary = ed;
      if (gs) r.generativeSummary = gs;
    }));
  }catch(_){}
  applyAI();          // 用補抓到的簡介重算上榜理由
  renderList();
}

  { label:"素食友善", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"servesVeg", op:"truthy" }] },
  { label:"戶外座位", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"outdoor", op:"truthy" }] },
  { label:"寵物友善", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"allowsDogs", op:"truthy" }] },
  { label:"現場音樂", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"liveMusic", op:"truthy" }] },
  { label:"無障礙資訊", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"accessStr", op:"nonempty" }] },
  { label:"停車資訊", cls:"cert-service", note:{ text:"Google" }, all:[{ field:"parkStr", op:"nonempty" }] },
];
let certBadgeRules = CERT_BADGE_RULES_FALLBACK;
let certBadgeRulesPromise = null;

function readField(obj, path){
  return String(path || "").split(".").filter(Boolean).reduce((o,k) => o == null ? undefined : o[k], obj);
}
function compareRule(r, cond){
  const actual = readField(r, cond.field);
  switch (cond.op){
    case ">=": return Number(actual || 0) >= Number(cond.value);
    case ">": return Number(actual || 0) > Number(cond.value);
    case "<=": return Number(actual || 0) <= Number(cond.value);
    case "<": return Number(actual || 0) < Number(cond.value);
    case "==": return actual === cond.value;
    case "!=": return actual !== cond.value;
    case "truthy": return !!actual;
    case "nonempty": return String(actual || "").trim().length > 0;
    default: return false;
  }
}
function certRuleMatches(r, rule){
  const all = Array.isArray(rule.all) ? rule.all : [];
  const any = Array.isArray(rule.any) ? rule.any : [];
  return (!all.length || all.every(cond => compareRule(r, cond)))
    && (!any.length || any.some(cond => compareRule(r, cond)));
}
function certNote(r, note){
  if (!note) return "";
  if (note.text) return note.text;
  const value = readField(r, note.field);
  if (value == null || value === "") return "";
  if (note.format === "fixed1") return Number(value).toFixed(1);
  return String(value);
}
async function ensureCertificationRules(){
  if (certBadgeRulesPromise) return certBadgeRulesPromise;
  certBadgeRulesPromise = fetch(CONFIG.CERT_BADGES_URL, { cache:"force-cache" })
    .then(res => res.ok ? res.json() : Promise.reject(new Error(`HTTP ${res.status}`)))
    .then(data => {
      certBadgeRules = Array.isArray(data.rules) && data.rules.length ? data.rules : CERT_BADGE_RULES_FALLBACK;
      return certBadgeRules;
    })
    .catch(e => {
      console.warn("[認證] 認證規則載入失敗，使用內建規則：", e.message);
      certBadgeRules = CERT_BADGE_RULES_FALLBACK;
      return certBadgeRules;
    });
  return certBadgeRulesPromise;
}
function certificationBadges(r){
  return certBadgeRules
    .filter(rule => certRuleMatches(r, rule))
    .map(rule => ({ label:rule.label, note:certNote(r, rule.note), cls:rule.cls || "cert" }))
    .slice(0, 8);
}

function certBadgeHTML(c){
  return `<span class="badge ${escapeHTML(c.cls || "cert")}">${escapeHTML(c.label)}${c.note?`<span class="yr">${escapeHTML(c.note)}</span>`:""}</span>`;
}

$("#fab").addEventListener("click", openMap);
$("#backToList").addEventListener("click", ()=>$("#mapView").classList.add("hidden"));

async function openMap(){
  const view = $("#mapView");
  const opening = view.classList.contains("hidden");
  view.classList.remove("hidden");
  if (opening) pushTransientUiHistory();
  if (!hasGoogleApiKey){
    $("#map").classList.add("hidden");
    const fb = $("#mapFallback"); fb.classList.remove("hidden");
    fb.innerHTML = "地圖需要 Google 金鑰。<br>填入 CONFIG.GOOGLE_API_KEY 後，這裡會顯示前三家的標記。";
    return;
  }
  try{
    await loadGoogle();
    if (!state.map){
      const { Map } = await google.maps.importLibrary("maps");
      state.map = new Map($("#map"), {
        center: state.center, zoom: 15, disableDefaultUI: true,
        gestureHandling: "greedy", colorScheme: "DARK",
        mapId: CONFIG.MAP_ID,   // 向量地圖 ID：進階標記需要，且支援深色樣式
      });
    } else {
      state.map.setCenter(state.center);
    }
    renderMarkers();
  }catch(e){
    $("#map").classList.add("hidden");
    $("#mapFallback").classList.remove("hidden");
    $("#mapFallback").textContent = "地圖載入失敗：" + e.message;
  }
}

async function renderMarkers(){
  if (!state.map) return;
  const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");
  state.markers.forEach(m=>m.map=null); state.markers=[];
  // 中心點
  state.ranked.forEach((r,i)=>{
    const pin = new PinElement({
      glyph: String(i+1), background: i===0? "#C8102E":"#1F1819",
      glyphColor: i===0? "#FFF6F3":"#F2ECE6", borderColor: i===0? "#C8102E":"#3A2F32", scale: 1.1,
    });
    const mk = new AdvancedMarkerElement({ map: state.map, position: r.loc, content: pin.element, title: r.name });
    state.markers.push(mk);
  });
}

  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function jitter(c){return {lat:c.lat+(Math.random()-.5)*.004, lng:c.lng+(Math.random()-.5)*.004};}

/* ============================================================
   Step 2 — 評鑑模組：載入名單 + 模糊比對 + 500 盤彙總
   ============================================================ */
let AWARDS = null, awardsPromise = null;
let EXTERNAL_SIGNALS = null, externalSignalsPromise = null;

function ensureAwards(){
  if (AWARDS) return Promise.resolve(AWARDS);
  if (awardsPromise) return awardsPromise;
  awardsPromise = fetch(CONFIG.AWARDS_URL)
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(j => { AWARDS = j.restaurants || []; })
    .catch(e => { AWARDS = []; console.warn("[評鑑] 評鑑名單載入失敗，不使用備援死資料：", e.message); })
    .then(() => AWARDS);
  return awardsPromise;
}

function ensureExternalSignals(){
  if (EXTERNAL_SIGNALS) return Promise.resolve(EXTERNAL_SIGNALS);
  if (externalSignalsPromise) return externalSignalsPromise;
  externalSignalsPromise = fetch(CONFIG.EXTERNAL_SIGNALS_URL, { cache:"force-cache" })
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(j => { EXTERNAL_SIGNALS = j.restaurants || []; })
    .catch(e => { EXTERNAL_SIGNALS = []; console.warn("[外部熱度] 熱度資料載入失敗，不使用社群加權：", e.message); })
    .then(() => EXTERNAL_SIGNALS);
  return externalSignalsPromise;
}

// 店名正規化：全形→半形、去空白標點、去常見尾綴；用於模糊比對
function normName(s){
  return (s||"").toString()
    .normalize("NFKC")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[’‘`´]/g, "'")
    .replace(/臺/g, "台")
    .replace(/　/g," ")
    .replace(/\s+/g,"")
    .replace(/[()（）・·.,，、!！?？\-_/&]/g,"")
    .replace(/(總店|本店|本舖|旗艦店|分店)$/,"")
    .toLowerCase();
}

function awardCityMatches(rest, entry){
  const awardCity = normalizeTaiwanCity(entry?.city || cityAreaFromAddress(entry?.address || "").city || "");
  if (!awardCity) return true;
  const restCity = normalizeTaiwanCity(rest.city || rest.lbCity || cityAreaFromAddress(rest.address || "").city || "");
  if (!restCity) return false;
  return restCity === awardCity;
}
function awardNames(entry){
  return [entry?.name, ...(entry?.aliases || [])].filter(Boolean);
}

function externalSignalNames(entry){
  return [entry?.name, ...(entry?.aliases || [])].filter(Boolean);
}
function externalSignalCityMatches(rest, entry){
  const entryCity = normalizeTaiwanCity(entry?.city || cityAreaFromAddress(entry?.address || "").city || "");
  if (!entryCity) return true;
  const restCity = normalizeTaiwanCity(rest.city || rest.lbCity || cityAreaFromAddress(rest.address || "").city || "");
  return !!restCity && restCity === entryCity;
}
function matchExternalSignals(rest, list){
  if (!list || !list.length) return [];
  if (rest.id){
    const byId = list.find(e => e.placeId && e.placeId === rest.id);
    if (byId?.signals?.length) return byId.signals;
  }
  const rn = normName(rest.name);
  if (!rn) return [];
  for (const entry of list){
    if (!externalSignalCityMatches(rest, entry)) continue;
    for (const candidateName of externalSignalNames(entry)){
      const en = normName(candidateName);
      if (!en) continue;
      if (en === rn || (en.length >= 4 && (rn.includes(en) || en.includes(rn)))) {
        return entry.signals || [];
      }
    }
  }
  return [];
}
function applyExternalSignals(items){
  items.forEach(r => {
    const signals = matchExternalSignals(r, EXTERNAL_SIGNALS || []);
    r.externalSignals = signals;
    r.socialSignal = primarySocialSignal(signals);
  });
}

// 比對：完全相等→high；包含關係→medium（地址可升級為 high）
function awardAddressHasDetail(address){
  return /[區鄉鎮市].*[路街道巷弄號]|[路街道巷弄號]/.test(address || "");
}
function awardKey(a){
  return [a.guide, a.year || "", a.level || "", a.plates || "", Array.isArray(a.dishPlates) ? a.dishPlates.join(",") : ""].join("|");
}
function matchAwards(rest, list){
  const rn = normName(rest.name);
  if (!rn) return [];
  const matches = [];
  for (const e of list){
    if (!awardCityMatches(rest, e)) continue;
    let entryConf = "none";
    for (const candidateName of awardNames(e)){
      const en = normName(candidateName);
      if (!en) continue;
      if (en === rn){ entryConf = "high"; break; }
      if (en.length>=3 && (rn.includes(en)||en.includes(rn))) entryConf = "medium";
    }
    if (entryConf==="medium" && awardAddressHasDetail(e.address) && rest.address){
      const a1=e.address.replace(/\s/g,""), a2=rest.address.replace(/\s/g,"");
      if (a1 && a2 && (a2.includes(a1.slice(0,6))||a1.includes(a2.slice(0,6)))) entryConf="high";
    }
    if (entryConf === "high" || entryConf === "medium") matches.push({ entry:e, conf:entryConf });
  }
  return matches;
}

// 彙總 500 系列（菜/碗/甜品單位數 → 餐廳層級總單位數）並標準化顯示
function normalizeAwards(awards){
  const priority = a => a.guide === "michelin" ? 1
    : (a.guide === "50best" ? 2
    : (a.guide === "bib" ? 3
    : (a.guide === "greenstar" ? 4
    : (a.guide === "500plate" ? 5
    : (a.guide === "500bowl" ? 6
    : (a.guide === "500sweet" ? 7
    : (a.guide === "michelin_selected" ? 8 : 9)))))));
  return (awards||[]).map(a=>{
    if (a.guide==="500plate"){
      const plates = Array.isArray(a.dishPlates)
        ? a.dishPlates.reduce((s,x)=>s + (Number(x) || 0), 0)
        : (Number(a.plates) || Number(String(a.level || "").match(/\d+/)?.[0]) || 0);
      return { ...a, plates, level:plates ? `${plates}盤` : "" };
    }
    if (a.guide==="500bowl"){
      const bowls = Array.isArray(a.dishBowls)
        ? a.dishBowls.reduce((s,x)=>s + (Number(x) || 0), 0)
        : (Number(a.bowls) || Number(String(a.level || "").match(/\d+/)?.[0]) || 0);
      return { ...a, bowls, level:bowls ? `${bowls}碗` : (a.level || "") };
    }
    if (a.guide==="500sweet"){
      const sweets = Array.isArray(a.dishSweets)
        ? a.dishSweets.reduce((s,x)=>s + (Number(x) || 0), 0)
        : (Number(a.sweets) || Number(String(a.level || "").match(/\d+/)?.[0]) || 0);
      return { ...a, sweets, level:sweets ? `${sweets}甜` : (a.level || "") };
    }
    return a;
  }).sort((a,b) => priority(a) - priority(b));
}

// 套用到搜尋結果：高信心自動標；低信心列入 console 待人工覆核（不默默標錯）
function applyAwards(items){
  const review = [];
  items.forEach(r=>{
    r.awards = r.awards || [];
    if (!AWARDS || !AWARDS.length) return;
    const matches = matchAwards(r, AWARDS);
    // 高信心（完全同名或地址相符）自動標。中信心（店名包含關係，如「鼎泰豐 101店」含「鼎泰豐」）
    // 也自動標，但記入 console 供人工覆核——真實 Google 店名常帶分店/地區後綴，純高信心會漏標。
    if (matches.length) {
      const merged = [...r.awards];
      matches.forEach(({ entry, conf }) => {
        normalizeAwards(entry.awards).forEach(a => {
          if (!merged.some(x => awardKey(x) === awardKey(a))) merged.push(a);
        });
        if (conf==="medium") review.push({ store:r.name, matched:entry.name });
      });
      r.awards = normalizeAwards(merged);
    }
  });
  if (review.length) console.info("[評鑑比對] 中信心自動標記（建議人工確認是否為同一家）：", review);
}
